# ==============================
# Spring Boot Application Name
# ==============================
spring.application.name=SITIMS

# Load local properties if available
spring.config.import=optional:application-local.properties

# ==============================
# MySQL Database Configuration
# ==============================
spring.datasource.url=jdbc:mysql://localhost:3306/SITIMS
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==============================
# JPA / Hibernate Configuration
# ==============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ==============================
# JWT Configuration (Used by JwtService)
# ==============================
jwt.secret=${JWT_SECRET}
jwt.expirationMs=28800000

# ==============================
# Server Configuration
# ==============================
server.port=8080
