<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0" />

    <title>SITIMS | Officer Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
            rel="stylesheet"
    />
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");

    const officerId = localStorage.getItem("userId");

    const officerName = localStorage.getItem("name");

    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    if (!token || !officerId || isTokenExpired(token)) {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<div class="flex min-h-screen">

    <!-- SIDEBAR -->
    <aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">

        <div class="mb-6">

            <div class="flex items-center gap-3 mb-1">

                <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

                <h2 class="text-xl font-extrabold">
                    SITIMS
                </h2>

            </div>

            <p class="text-blue-400 text-xs ml-9">
                Officer Panel
            </p>

        </div>

        <nav class="space-y-1 flex-1">

            <a href="Officer-dashboard.html"
               class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="Officer-edit-profile.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-person-gear"></i>

                Edit Profile

            </a>

        </nav>

        <button onclick="logout()"
                class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

            <i class="bi bi-box-arrow-left"></i>

            Logout

        </button>

    </aside>

    <!-- MAIN -->
    <main class="flex-1 p-8 overflow-y-auto">

        <!-- TOP -->
        <div class="flex justify-between items-center mb-8">

            <div>

                <h1 class="text-3xl font-bold text-gray-800">

                    Assigned Incidents

                </h1>

                <p class="text-gray-500 text-sm mt-1">

                    Officer:
                    <span id="topOfficerName"
                          class="text-blue-600 font-semibold"></span>

                </p>

            </div>

            <button onclick="loadAssignedIncidents()"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl shadow transition flex items-center gap-2">

                <i class="bi bi-arrow-clockwise"></i>

                Refresh

            </button>

        </div>

        <!-- LOADING -->
        <div id="loadingState"
             class="hidden text-center py-16 text-gray-400">

            <i class="bi bi-arrow-repeat text-4xl animate-spin block mb-3"></i>

            <p>Loading incidents...</p>

        </div>

        <!-- EMPTY -->
        <div id="emptyState"
             class="hidden text-center py-16">

            <i class="bi bi-inbox text-5xl text-gray-300 block mb-4"></i>

            <p class="text-gray-500 text-lg">

                No incidents assigned yet.

            </p>

        </div>

        <!-- INCIDENT GRID -->
        <div id="incidentsGrid"
             class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    </main>

</div>

<!-- UPDATE MODAL -->
<div id="modal"
     class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">

    <div class="bg-white rounded-3xl w-full max-w-2xl shadow-2xl">

        <!-- HEADER -->
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">

            <h2 class="text-2xl font-bold text-blue-600 flex items-center gap-2">

                <i class="bi bi-pencil-square"></i>

                Update Incident

            </h2>

            <button onclick="closeModal()"
                    class="text-gray-400 hover:text-red-500 text-2xl">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <!-- BODY -->
        <div class="p-6 space-y-5">

            <!-- STATUS -->
            <div>

                <label class="block text-sm font-semibold text-gray-700 mb-2">

                    Update Status

                </label>

                <select id="statusSelect"
                        class="w-full border border-gray-300 p-4 rounded-2xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">

                    <option value="PENDING">PENDING</option>

                    <option value="IN_PROGRESS">IN_PROGRESS</option>

                    <option value="ASSIGNED">ASSIGNED</option>

                    <option value="RESOLVED">RESOLVED</option>

                    <option value="CLOSED">CLOSED</option>

                </select>

            </div>

            <!-- REMARK -->
            <div>

                <label class="block text-sm font-semibold text-gray-700 mb-2">

                    Add Remark

                </label>

                <div class="flex gap-2 items-end">

                    <textarea id="remarkInput"
                              rows="2"
                              maxlength="500"
                              placeholder="Write remark..."
                              class="flex-1 border border-gray-300 p-3 rounded-2xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none resize-none"></textarea>

                    <!-- SEND BUTTON -->
                    <button id="saveRemarkBtn"
                            class="bg-blue-600 hover:bg-blue-700 text-white w-12 h-12 rounded-2xl flex items-center justify-center transition">

                        <i class="bi bi-send-fill"></i>

                    </button>

                </div>

            </div>

            <!-- PREVIOUS REMARKS -->
            <div>

                <p class="text-sm font-semibold text-gray-700 mb-3">

                    Previous Remarks

                </p>

                <div id="remarkList"
                     class="max-h-80 overflow-y-auto space-y-3 bg-gray-50 rounded-2xl p-4 border border-gray-200">

                    <p class="text-gray-400 text-sm text-center">

                        Loading remarks...

                    </p>

                </div>

            </div>

        </div>

        <!-- FOOTER -->
        <div class="p-6 border-t border-gray-100 flex justify-end gap-3">

            <button onclick="closeModal()"
                    class="px-6 py-3 bg-gray-100 hover:bg-gray-200 rounded-2xl font-semibold transition">

                Cancel

            </button>

            <button id="saveBtn"
                    class="px-6 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-2xl font-semibold transition flex items-center gap-2">

                <i class="bi bi-check-circle"></i>

                Save Status

            </button>

        </div>

    </div>

</div>

<!-- EDIT REMARK MODAL -->
<div id="editRemarkModal"
     class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">

    <div class="bg-white rounded-3xl w-full max-w-xl shadow-2xl">

        <!-- HEADER -->
        <div class="p-6 border-b border-gray-100 flex justify-between items-center">

            <h2 class="text-xl font-bold text-yellow-600 flex items-center gap-2">

                <i class="bi bi-pencil"></i>

                Edit Remark

            </h2>

            <button onclick="closeEditModal()"
                    class="text-gray-400 hover:text-red-500 text-2xl">

                <i class="bi bi-x-lg"></i>

            </button>

        </div>

        <!-- BODY -->
        <div class="p-6">

            <textarea id="editRemarkInput"
                      rows="6"
                      maxlength="500"
                      class="w-full border border-gray-300 p-4 rounded-2xl bg-gray-50 focus:ring-2 focus:ring-yellow-400 focus:outline-none resize-none"></textarea>

        </div>

        <!-- FOOTER -->
        <div class="p-6 border-t border-gray-100 flex justify-end gap-3">

            <button onclick="closeEditModal()"
                    class="px-5 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl font-semibold">

                Cancel

            </button>

            <button id="updateRemarkBtn"
                    class="px-5 py-2 bg-yellow-500 hover:bg-yellow-600 text-white rounded-xl font-semibold">

                Update Remark

            </button>

        </div>

    </div>

</div>

<script>

    document.getElementById("topOfficerName").innerText =
        officerName || "Officer";

    const modal =
        document.getElementById("modal");

    const editRemarkModal =
        document.getElementById("editRemarkModal");

    const statusSelect =
        document.getElementById("statusSelect");

    const remarkInput =
        document.getElementById("remarkInput");

    const remarkList =
        document.getElementById("remarkList");

    const saveRemarkBtn =
        document.getElementById("saveRemarkBtn");

    let editingIncidentId = null;

    let editingRemarkId = null;

    const statusColors = {

        PENDING: "bg-yellow-100 text-yellow-800",

        IN_PROGRESS: "bg-blue-100 text-blue-800",

        ASSIGNED: "bg-indigo-100 text-indigo-800",

        RESOLVED: "bg-green-100 text-green-800",

        CLOSED: "bg-gray-200 text-gray-700"
    };

    // ENTER KEY SAVE
    remarkInput.addEventListener("keydown", function(e) {

        if (e.key === "Enter" && !e.shiftKey) {

            e.preventDefault();

            saveRemarkBtn.click();
        }
    });

    // LOAD INCIDENTS
    async function loadAssignedIncidents() {

        document.getElementById("loadingState")
            .classList.remove("hidden");

        document.getElementById("emptyState")
            .classList.add("hidden");

        document.getElementById("incidentsGrid")
            .innerHTML = "";

        try {

            const res = await fetch(
                `${BASE_URL}/api/officer/assigned/${officerId}`,
                {
                    headers: {
                        Authorization: "Bearer " + token
                    }
                }
            );

            const list = await res.json();

            document.getElementById("loadingState")
                .classList.add("hidden");

            if (!list.length) {

                document.getElementById("emptyState")
                    .classList.remove("hidden");

                return;
            }

            list.forEach(renderIncidentCard);

        } catch {

            document.getElementById("loadingState")
                .classList.add("hidden");
        }
    }

    // INCIDENT CARD
    function renderIncidentCard(i) {

        const color =
            statusColors[i.status] ||
            "bg-gray-100 text-gray-700";

        const div =
            document.createElement("div");

        div.className =
            "bg-white rounded-2xl shadow-md hover:shadow-xl transition p-6 border border-gray-100";

        div.innerHTML = `

            <div class="flex justify-between items-start mb-3">

                <h3 class="font-bold text-lg text-gray-800">

                    ${i.title}

                </h3>

                <span class="text-xs px-3 py-1 rounded-full font-semibold ${color}">

                    ${i.status}

                </span>

            </div>

            <p class="text-gray-500 text-sm mb-4 line-clamp-3">

                ${i.description || "No description"}

            </p>

            <div class="space-y-2 text-sm text-gray-600 mb-5">

                <p>

                    <i class="bi bi-geo-alt-fill text-blue-400 mr-1"></i>

                    ${i.location || "—"}

                </p>

                <p>

                    <i class="bi bi-exclamation-diamond-fill text-red-400 mr-1"></i>

                    Severity:
                    ${i.severity || "—"}

                </p>

            </div>

            <!-- BUTTONS -->
            <div class="flex items-center gap-2 pt-3 border-t border-gray-100">

                <!-- UPDATE -->
                <button
                    onclick="openUpdate(${i.id}, '${i.status}')"
                    class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl text-sm font-semibold transition flex items-center gap-2">

                    <i class="bi bi-pencil-square"></i>

                    <span>Update</span>

                </button>

                <!-- VIEW -->
                <button
                    onclick="viewDetails(${i.id})"
                    class="bg-gray-200 hover:bg-gray-300 text-gray-800 w-10 h-10 rounded-xl text-sm transition flex items-center justify-center">

                    <i class="bi bi-eye"></i>

                </button>

                <!-- HISTORY -->
                <button
                    onclick="viewHistory(${i.id})"
                    class="bg-purple-500 hover:bg-purple-600 text-white w-10 h-10 rounded-xl text-sm transition flex items-center justify-center">

                    <i class="bi bi-clock-history"></i>

                </button>

            </div>
        `;

        document.getElementById("incidentsGrid")
            .appendChild(div);
    }

    // OPEN UPDATE MODAL
    async function openUpdate(id, status) {

        editingIncidentId = id;

        statusSelect.value = status;

        remarkInput.value = "";

        modal.classList.remove("hidden");

        modal.classList.add("flex");

        loadRemarks(id);
    }

    // LOAD REMARKS
    async function loadRemarks(id) {

        remarkList.innerHTML = `
            <p class="text-gray-400 text-center">
                Loading remarks...
            </p>
        `;

        try {

            const res = await fetch(
                `${BASE_URL}/api/remarks/incident/${id}`,
                {
                    headers: {
                        Authorization: "Bearer " + token
                    }
                }
            );

            const remarks = await res.json();

            if (!remarks.length) {

                remarkList.innerHTML = `
                    <p class="text-gray-400 text-center">
                        No remarks yet.
                    </p>
                `;

                return;
            }

            remarkList.innerHTML =
                remarks.map(r => {

                    const isOwner =
                        String(r.officerId) ===
                        String(officerId);

                    return `

                        <div class="bg-white border border-gray-200 rounded-2xl p-4">

                            <div class="flex justify-between items-start gap-3">

                                <div class="flex-1">

                                    <p class="text-blue-600 font-semibold text-sm">

                                        ${r.officerName}

                                    </p>

                                    <p class="text-gray-700 text-sm mt-2 break-words">

                                        ${r.text}

                                    </p>

                                    <p class="text-gray-400 text-xs mt-3">

                                        ${r.createdAt
                                            ? new Date(r.createdAt)
                                                .toLocaleString("en-IN")
                                            : ""}

                                    </p>

                                </div>

                                ${isOwner ? `

                                    <div class="flex gap-2">

                                        <button
                                            onclick='openEditRemarkModal(${r.id}, ${JSON.stringify(r.text)})'
                                            class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-2 rounded-xl text-xs transition">

                                            <i class="bi bi-pencil"></i>

                                        </button>

                                        <button
                                            onclick="deleteRemark(${r.id})"
                                            class="bg-red-600 hover:bg-red-700 text-white px-3 py-2 rounded-xl text-xs transition">

                                            <i class="bi bi-trash"></i>

                                        </button>

                                    </div>

                                ` : ""}

                            </div>

                        </div>

                    `;
                }).join("");

        } catch {

            remarkList.innerHTML = `
                <p class="text-red-400 text-center">
                    Failed to load remarks.
                </p>
            `;
        }
    }

    // CLOSE MODAL
    function closeModal() {

        modal.classList.add("hidden");

        modal.classList.remove("flex");
    }

    // SAVE STATUS
    document.getElementById("saveBtn")
        .addEventListener("click", async () => {

            try {

                // GET EMAIL FROM JWT TOKEN
                const payload =
                    JSON.parse(atob(token.split(".")[1]));

                const officerEmail =
                    payload.sub;

                const response = await fetch(
                    `${BASE_URL}/api/officer/update`,
                    {

                        method: "POST",

                        headers: {
                            "Content-Type": "application/json",
                            Authorization: "Bearer " + token
                        },

                        body: JSON.stringify({

                            incidentId: editingIncidentId,

                            status: statusSelect.value,

                            remark: remarkInput.value.trim(),

                            officerEmail: officerEmail
                        })
                    }
                );

                if (!response.ok) {

                    alert("Failed to update incident");

                    return;
                }

                alert("Incident updated successfully");

                closeModal();

                loadAssignedIncidents();

            } catch (e) {

                console.log(e);

                alert("Failed to update incident");
            }
        });

    // SAVE REMARK
    saveRemarkBtn.addEventListener("click", async () => {

        const remark =
            remarkInput.value.trim();

        if (!remark) {
            return;
        }

        try {

            const res = await fetch(
                `${BASE_URL}/api/remarks/add`,
                {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json",
                        Authorization: "Bearer " + token
                    },

                    body: JSON.stringify({

                        incidentId: editingIncidentId,

                        text: remark
                    })
                }
            );

            if (!res.ok) {

                alert("Failed to save remark");

                return;
            }

            remarkInput.value = "";

            loadRemarks(editingIncidentId);

        } catch {

            alert("Error saving remark");
        }
    });

    // OPEN EDIT MODAL
    function openEditRemarkModal(id, text) {

        editingRemarkId = id;

        document.getElementById("editRemarkInput")
            .value = text;

        editRemarkModal.classList.remove("hidden");

        editRemarkModal.classList.add("flex");
    }

    // CLOSE EDIT MODAL
    function closeEditModal() {

        editRemarkModal.classList.add("hidden");

        editRemarkModal.classList.remove("flex");
    }

    // UPDATE REMARK
    document.getElementById("updateRemarkBtn")
        .addEventListener("click", async () => {

            const newText =
                document.getElementById("editRemarkInput")
                    .value.trim();

            if (!newText) {
                return;
            }

            try {

                const res = await fetch(
                    `${BASE_URL}/api/remarks/update/${editingRemarkId}?text=${encodeURIComponent(newText)}`,
                    {

                        method: "PUT",

                        headers: {
                            Authorization: "Bearer " + token
                        }
                    }
                );

                if (!res.ok) {

                    alert("Failed to update remark");

                    return;
                }

                closeEditModal();

                loadRemarks(editingIncidentId);

            } catch {

                alert("Error updating remark");
            }
        });

    // DELETE REMARK
    async function deleteRemark(id) {

        const ok =
            confirm("Delete this remark?");

        if (!ok) {
            return;
        }

        try {

            const res = await fetch(
                `${BASE_URL}/api/remarks/delete/${id}`,
                {

                    method: "DELETE",

                    headers: {
                        Authorization: "Bearer " + token
                    }
                }
            );

            if (!res.ok) {

                alert("Failed to delete remark");

                return;
            }

            loadRemarks(editingIncidentId);

        } catch {

            alert("Error deleting remark");
        }
    }

    // VIEW DETAILS
    function viewDetails(id) {

        window.location.href =
            `officer-incident-details.html?id=${id}`;
    }

    // VIEW HISTORY
    function viewHistory(id) {

        window.location.href =
            `incident-history.html?id=${id}`;
    }

    // LOGOUT
    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

    // INITIAL LOAD
    loadAssignedIncidents();

</script>

</body>

</html>
