<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Officer Dashboard — Assigned Incidents</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 text-gray-900 min-h-screen p-6">

<script>
    const token = localStorage.getItem('token');
    const officerId = localStorage.getItem('userId');
    const officerName = localStorage.getItem('name');
    const officerEmail = localStorage.getItem('email');

    if (!token || !officerId) {
        alert('Please login first!');
        window.location.href = 'login.html';
    }
</script>

<div class="max-w-6xl mx-auto">
    <!-- Officer Profile Card -->
    <div class="bg-white p-6 rounded-3xl shadow-lg mb-6 flex justify-between items-center">
        <div>
            <h2 id="profileName" class="text-2xl font-bold text-blue-600"></h2>
            <p class="text-sm text-gray-500">ID: <span id="profileId"></span></p>
            <p class="text-sm text-gray-500">Email: <span id="profileEmail"></span></p>
        </div>
        <button id="logoutBtnProfile" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded font-semibold">Logout</button>
    </div>

    <!-- INCIDENTS -->
    <section>
        <header class="flex items-center justify-between mb-4">
            <h1 class="text-2xl font-bold text-blue-600">Assigned Incidents</h1>
            <button id="refreshIncidentsBtn" class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700">Refresh</button>
        </header>

        <div id="emptyIncidents" class="text-center text-gray-500">Loading incidents...</div>
        <div id="incidentsGrid" class="grid gap-4 grid-cols-1 md:grid-cols-2 lg:grid-cols-3"></div>
    </section>
</div>

<!-- INCIDENT UPDATE MODAL -->
<div id="modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center">
    <div class="bg-white rounded-3xl w-11/12 max-w-lg p-6">
        <h2 class="text-xl font-semibold mb-3 text-blue-600">Update Incident</h2>

        <div class="mb-3">
            <label class="block text-sm font-medium mb-1 text-gray-700">Status</label>
            <select id="statusSelect" class="w-full border border-gray-300 p-2 rounded bg-white text-gray-900">
                <option value="NEW">NEW</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="ASSIGNED">ASSIGNED</option>
                <option value="RESOLVED">RESOLVED</option>
                <option value="CLOSED">CLOSED</option>
            </select>
        </div>

        <div class="mb-3">
            <label class="block text-sm font-medium mb-1 text-gray-700">Remark</label>
            <textarea id="remarkInput" rows="4" class="w-full border border-gray-300 p-2 rounded bg-white text-gray-900" placeholder="Add officer remark..."></textarea>
        </div>

        <div id="remarkList" class="max-h-48 overflow-y-auto mb-3"></div>

        <div class="flex justify-end gap-3">
            <button id="cancelBtn" class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded">Cancel</button>
            <button id="saveBtn" class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded">Save</button>
        </div>
    </div>
</div>

<script>
    document.getElementById('profileName').innerText = officerName;
    document.getElementById('profileId').innerText = officerId;
    document.getElementById('profileEmail').innerText = officerEmail;

    document.getElementById('logoutBtnProfile').addEventListener('click', () => {
        localStorage.clear();
        window.location.href = 'login.html';
    });

    const incidentsGrid = document.getElementById('incidentsGrid');
    const emptyIncidents = document.getElementById('emptyIncidents');
    const modal = document.getElementById('modal');
    const statusSelect = document.getElementById('statusSelect');
    const remarkInput = document.getElementById('remarkInput');
    const remarkList = document.getElementById('remarkList');
    const saveBtn = document.getElementById('saveBtn');
    const cancelBtn = document.getElementById('cancelBtn');
    let editingIncidentId = null;

    async function loadAssignedIncidents() {
        emptyIncidents.innerText = "Loading...";
        incidentsGrid.innerHTML = "";

        try {
            const res = await fetch(`http://localhost:8080/api/officer/assigned/${officerId}`, {
                headers: { "Authorization": "Bearer " + token }
            });

            const list = await res.json();

            if (!list.length) {
                emptyIncidents.innerText = "No incidents assigned.";
                return;
            }

            emptyIncidents.innerText = "";
            list.forEach(i => renderIncidentCard(i));

        } catch (err) {
            emptyIncidents.innerText = "Error loading incidents.";
        }
    }

    function renderIncidentCard(i) {
        const div = document.createElement("div");
        div.className = "bg-white p-4 rounded-2xl shadow";

        const color = {
            NEW: "bg-yellow-100 text-yellow-800",
            IN_PROGRESS: "bg-blue-100 text-blue-800",
            ASSIGNED: "bg-indigo-100 text-indigo-800",
            RESOLVED: "bg-green-100 text-green-800",
            CLOSED: "bg-gray-200 text-gray-700"
        }[i.status];

        div.innerHTML = `
            <div class="flex justify-between">
                <h3 class="text-lg font-semibold">${i.title}</h3>
                <span class="px-2 py-1 rounded ${color}">${i.status}</span>
            </div>
            <p class="text-sm">${i.description}</p>

            <div class="mt-3 text-sm text-gray-600">
                <p><strong>Location:</strong> ${i.location}</p>
                <p><strong>Severity:</strong> ${i.severity}</p>
                <p><strong>Officer:</strong> ${officerName}</p>
                <p><strong>Created:</strong> ${i.createdAt}</p>
            </div>

            <div class="mt-4 flex gap-2">
                <button class="px-3 py-1 bg-blue-600 text-white rounded"
                    onclick="openUpdate(${i.id}, '${i.status}')">Update</button>
                <button class="px-3 py-1 bg-gray-200 rounded"
                    onclick="viewIncidentDetails(${i.id})">Details</button>
            </div>
        `;
        incidentsGrid.appendChild(div);
    }

    window.openUpdate = async function(id, status) {
        editingIncidentId = id;
        statusSelect.value = status;
        remarkInput.value = "";

        modal.classList.remove("hidden");
        modal.style.display = "flex";

        const res = await fetch(`http://localhost:8080/api/remarks/incident/${id}`, {
            headers: { "Authorization": "Bearer " + token }
        });

        const remarks = await res.json();

        if (!remarks.length) {
            remarkList.innerHTML = `<p class="text-gray-500">No remarks yet.</p>`;
            return;
        }

        remarkList.innerHTML = remarks.map(r => `
            <div class="bg-gray-200 p-2 rounded mb-1">
                <p class="font-semibold text-blue-600">${r.officerName}</p>
                <p>${r.text}</p>
                <p class="text-sm text-gray-600">${r.createdAt}</p>
            </div>
        `).join("");
    };

    cancelBtn.addEventListener("click", () => {
        modal.classList.add("hidden");
        modal.style.display = "none";
    });

    saveBtn.addEventListener("click", async () => {
        const remark = remarkInput.value.trim();

        await fetch("http://localhost:8080/api/officer/update", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Authorization": "Bearer " + token
            },
            body: JSON.stringify({
                incidentId: editingIncidentId,
                status: statusSelect.value
            })
        });

        if (remark.length > 0) {
            await fetch(`http://localhost:8080/api/remarks/add?officerEmail=${officerEmail}`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    incidentId: editingIncidentId,
                    text: remark
                })
            });
        }

        alert("Updated successfully!");
        modal.classList.add("hidden");
        modal.style.display = "none";
        loadAssignedIncidents();
    });

    function viewIncidentDetails(id) {
        window.location.href = `officer-incident-details.html?id=${id}`;
    }

    document.getElementById("refreshIncidentsBtn").addEventListener("click", loadAssignedIncidents);
    loadAssignedIncidents();
</script>

</body>
</html>
