<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Officer Dashboard</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");

    const officerId = localStorage.getItem("userId");

    const officerName = localStorage.getItem("name");

    const officerEmail = localStorage.getItem("emailFromLogin");

    // ✅ Token expiry check
    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    if (!token || !officerId || isTokenExpired(token)) {

        localStorage.clear();

        alert("Please login first!");

        window.location.href = "login.html";
    }

</script>

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">

        <div class="mb-6">

            <div class="flex items-center gap-3 mb-1">

                <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

                <h2 class="text-xl font-extrabold">SITIMS</h2>

            </div>

            <p class="text-blue-400 text-xs ml-9">Officer Panel</p>

        </div>

        <nav class="space-y-1 flex-1">

            <a href="Officer-dashboard.html"
               class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">

                <i class="bi bi-speedometer2"></i> Dashboard

            </a>

            <a href="Officer-edit-profile.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-list-check"></i> edit profile

            </a>

        </nav>

        <button onclick="logout()"
                class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

            <i class="bi bi-box-arrow-left"></i> Logout

        </button>

    </aside>

    <!-- Main -->
    <main class="flex-1 p-8 overflow-y-auto">

        <!-- Top Bar -->
        <div class="flex justify-between items-center mb-8">

            <div>

                <h1 class="text-3xl font-bold text-gray-800">
                    Assigned Incidents
                </h1>

                <p class="text-gray-500 text-sm mt-1">

                    Officer:
                    <span class="text-blue-600 font-semibold"
                          id="topOfficerName"></span>

                </p>

            </div>

            <button onclick="loadAssignedIncidents()"
                    class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl transition shadow">

                <i class="bi bi-arrow-clockwise"></i> Refresh

            </button>

        </div>

        <!-- Loading -->
        <div id="loadingState"
             class="text-center py-16 text-gray-400 hidden">

            <i class="bi bi-arrow-repeat text-4xl animate-spin block mb-3"></i>

            <p>Loading incidents...</p>

        </div>

        <!-- Empty State -->
        <div id="emptyState"
             class="hidden text-center py-16">

            <i class="bi bi-inbox text-5xl text-gray-300 block mb-4"></i>

            <p class="text-gray-500 text-lg">
                No incidents assigned yet.
            </p>

        </div>

        <!-- Incidents Grid -->
        <div id="incidentsGrid"
             class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>

    </main>

</div>

<!-- Update Modal -->
<div id="modal"
     class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50 p-4">

    <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl">

        <div class="p-6 border-b border-gray-100">

            <h2 class="text-xl font-bold text-blue-600 flex items-center gap-2">

                <i class="bi bi-pencil-square"></i>

                Update Incident

            </h2>

        </div>

        <div class="p-6 space-y-4">

            <div>

                <label class="block text-sm font-semibold text-gray-700 mb-1">

                    Update Status

                </label>

                <select id="statusSelect"
                        class="w-full border border-gray-300 p-3 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">

                    <option value="PENDING">PENDING</option>

                    <option value="IN_PROGRESS">IN_PROGRESS</option>

                    <option value="ASSIGNED">ASSIGNED</option>

                    <option value="RESOLVED">RESOLVED</option>

                    <option value="CLOSED">CLOSED</option>

                </select>

            </div>

            <div>

                <label class="block text-sm font-semibold text-gray-700 mb-1">

                    Add Remark

                </label>

                <textarea id="remarkInput"
                          rows="3"
                          class="w-full border border-gray-300 p-3 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none resize-none"
                          placeholder="Add your remark here..."></textarea>

            </div>

            <!-- Previous Remarks -->
            <div>

                <p class="text-sm font-semibold text-gray-700 mb-2">
                    Previous Remarks
                </p>

                <div id="remarkList"
                     class="max-h-40 overflow-y-auto space-y-2 bg-gray-50 rounded-xl p-3 border border-gray-200">

                    <p class="text-gray-400 text-sm text-center">
                        Loading remarks...
                    </p>

                </div>

            </div>

        </div>

        <div class="p-6 border-t border-gray-100 flex justify-end gap-3">

            <button id="cancelBtn"
                    class="px-5 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl font-semibold transition">

                Cancel

            </button>

            <button id="saveBtn"
                    class="px-5 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition flex items-center gap-2">

                <i class="bi bi-check-circle"></i>

                Save Changes

            </button>

        </div>

    </div>

</div>

<script>

    document.getElementById("topOfficerName").innerText =
        officerName || "Officer";

    const modal = document.getElementById("modal");

    const statusSelect =
        document.getElementById("statusSelect");

    const remarkInput =
        document.getElementById("remarkInput");

    const remarkList =
        document.getElementById("remarkList");

    let editingIncidentId = null;

    const statusColors = {

        PENDING: "bg-yellow-100 text-yellow-800",

        IN_PROGRESS: "bg-blue-100 text-blue-800",

        ASSIGNED: "bg-indigo-100 text-indigo-800",

        RESOLVED: "bg-green-100 text-green-800",

        CLOSED: "bg-gray-200 text-gray-700"
    };

    async function loadAssignedIncidents() {

        document.getElementById("loadingState")
            .classList.remove("hidden");

        document.getElementById("emptyState")
            .classList.add("hidden");

        document.getElementById("incidentsGrid")
            .innerHTML = "";

        try {

            const res = await fetch(
                `${BASE_URL}/api/officer/assigned/${officerId}`,
                {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            if (res.status === 401 || res.status === 403) {

                localStorage.clear();

                window.location.href = "login.html";

                return;
            }

            const list = await res.json();

            document.getElementById("loadingState")
                .classList.add("hidden");

            if (!list.length) {

                document.getElementById("emptyState")
                    .classList.remove("hidden");

                return;
            }

            list.forEach(renderIncidentCard);

        } catch (err) {

            document.getElementById("loadingState")
                .classList.add("hidden");

            document.getElementById("incidentsGrid").innerHTML = `

                <div class="col-span-3 text-center py-10 text-red-400">

                    <i class="bi bi-wifi-off text-4xl block mb-2"></i>

                    <p>Failed to load incidents. Check connection.</p>

                </div>
            `;
        }
    }

    function renderIncidentCard(i) {

        const color =
            statusColors[i.status] || "bg-gray-100 text-gray-700";

        const div = document.createElement("div");

        div.className =
            "bg-white rounded-2xl shadow-md hover:shadow-xl transition p-6 border border-gray-100";

        div.innerHTML = `

            <div class="flex justify-between items-start mb-3">

                <h3 class="font-bold text-gray-800 text-lg">
                    ${i.title}
                </h3>

                <span class="text-xs px-2 py-1 rounded-full font-semibold ${color}">
                    ${i.status}
                </span>

            </div>

            <p class="text-gray-500 text-sm mb-4 line-clamp-2">
                ${i.description}
            </p>

            <div class="space-y-1 text-sm text-gray-600 mb-4">

                <p>
                    <i class="bi bi-geo-alt-fill text-blue-400 mr-1"></i>
                    ${i.location || "—"}
                </p>

                <p>
                    <i class="bi bi-exclamation-diamond-fill text-red-400 mr-1"></i>
                    Severity: ${i.severity || "—"}
                </p>

                <p>
                    <i class="bi bi-calendar3 text-gray-400 mr-1"></i>
                    ${i.createdAt
                        ? new Date(i.createdAt)
                            .toLocaleDateString("en-IN")
                        : "—"}
                </p>

            </div>

            <div class="flex gap-2 pt-3 border-t border-gray-100">

                <button
                    onclick="openUpdate(${i.id}, '${i.status}')"
                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-xl text-sm font-semibold transition">

                    <i class="bi bi-pencil mr-1"></i>

                    Update

                </button>

                <button
                    onclick="viewIncidentDetails(${i.id})"
                    class="flex-1 bg-gray-100 hover:bg-gray-200 py-2 rounded-xl text-sm font-semibold transition">

                    <i class="bi bi-eye mr-1"></i>

                    Details

                </button>

            </div>
        `;

        document.getElementById("incidentsGrid")
            .appendChild(div);
    }

    // ==========================
    // OPEN UPDATE MODAL
    // ==========================
    window.openUpdate = async function(id, status) {

        editingIncidentId = id;

        statusSelect.value = status;

        remarkInput.value = "";

        remarkList.innerHTML =
            `<p class="text-gray-400 text-sm text-center">Loading...</p>`;

        modal.classList.remove("hidden");

        modal.style.display = "flex";

        try {

            const res = await fetch(
                `${BASE_URL}/api/remarks/incident/${id}`,
                {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            const remarks = await res.json();

            if (!remarks.length) {

                remarkList.innerHTML =
                    `<p class="text-gray-400 text-sm text-center">
                        No remarks yet.
                     </p>`;

                return;
            }

            remarkList.innerHTML = remarks.map(r => `

                <div class="bg-white border border-gray-200 rounded-xl p-3">

                    <div class="flex justify-between items-start gap-2">

                        <div class="flex-1">

                            <p class="text-blue-600 font-semibold text-sm">
                                ${r.officerName}
                            </p>

                            <p class="text-gray-700 text-sm mt-1">
                                ${r.text}
                            </p>

                            <p class="text-gray-400 text-xs mt-1">
                                ${r.createdAt
                                    ? new Date(r.createdAt)
                                        .toLocaleString("en-IN")
                                    : ""}
                            </p>

                        </div>

                        <div class="flex gap-2">

                            <button
                                onclick="editRemark(${r.id}, \`${r.text}\`)"
                                class="bg-yellow-500 hover:bg-yellow-600 text-white px-2 py-1 rounded-lg text-xs transition">

                                <i class="bi bi-pencil"></i>

                            </button>

                            <button
                                onclick="deleteRemark(${r.id})"
                                class="bg-red-600 hover:bg-red-700 text-white px-2 py-1 rounded-lg text-xs transition">

                                <i class="bi bi-trash"></i>

                            </button>

                        </div>

                    </div>

                </div>

            `).join("");

        } catch {

            remarkList.innerHTML =
                `<p class="text-red-400 text-sm text-center">
                    Failed to load remarks.
                 </p>`;
        }
    };

    document.getElementById("cancelBtn")
        .addEventListener("click", () => {

            modal.classList.add("hidden");

            modal.style.display = "none";
        });

    // ==========================
    // SAVE STATUS + REMARK
    // ==========================
    document.getElementById("saveBtn")
        .addEventListener("click", async () => {

            const remark = remarkInput.value.trim();

            const btn = document.getElementById("saveBtn");

            btn.disabled = true;

            btn.innerHTML =
                `<i class="bi bi-arrow-repeat animate-spin"></i> Saving...`;

            try {

                // ✅ ONLY THIS API
                // ❌ REMOVED DUPLICATE REMARK SAVE
                await fetch(`${BASE_URL}/api/officer/update`, {

                    method: "POST",

                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": "Bearer " + token
                    },

                    body: JSON.stringify({

                        incidentId: editingIncidentId,

                        status: statusSelect.value,

                        remark: remark,

                        officerEmail: officerEmail
                    })
                });

                modal.classList.add("hidden");

                modal.style.display = "none";

                loadAssignedIncidents();

            } catch (err) {

                alert("Failed to update. Please try again.");

            } finally {

                btn.disabled = false;

                btn.innerHTML =
                    `<i class="bi bi-check-circle"></i> Save Changes`;
            }
        });

    // ==========================
    // EDIT REMARK
    // ==========================
    async function editRemark(id, oldText) {

        const newText = prompt("Edit Remark", oldText);

        if (!newText || newText.trim() === "") {
            return;
        }

        try {

            const res = await fetch(

                `${BASE_URL}/api/remarks/update/${id}?text=${encodeURIComponent(newText)}`,

                {
                    method: "PUT",

                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            if (!res.ok) {

                return alert("Failed to update remark");
            }

            openUpdate(editingIncidentId, statusSelect.value);

        } catch {

            alert("Error updating remark");
        }
    }

    // ==========================
    // DELETE REMARK
    // ==========================
    async function deleteRemark(id) {

        const confirmDelete =
            confirm("Delete this remark?");

        if (!confirmDelete) return;

        try {

            const res = await fetch(

                `${BASE_URL}/api/remarks/delete/${id}`,

                {
                    method: "DELETE",

                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            if (!res.ok) {

                return alert("Failed to delete remark");
            }

            openUpdate(editingIncidentId, statusSelect.value);

        } catch {

            alert("Error deleting remark");
        }
    }

    function viewIncidentDetails(id) {

        window.location.href =
            `officer-incident-details.html?id=${id}`;
    }

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

    loadAssignedIncidents();

</script>

</body>
</html>
