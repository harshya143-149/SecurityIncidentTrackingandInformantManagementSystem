<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Officer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 text-gray-900 min-h-screen flex flex-col items-center p-6">

<script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    if (!token || role !== "ADMIN") window.location.href = "login.html";
</script>

<div class="bg-white border border-gray-200 rounded-3xl shadow-lg p-8 w-full max-w-lg">

    <h2 class="text-3xl font-bold mb-6 text-blue-600">Add Officer</h2>

    <form id="addOfficerForm" class="space-y-4">

        <div>
            <label class="block mb-1 text-gray-700">Full Name</label>
            <input id="fullName" class="w-full bg-white border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-400 outline-none" required>
        </div>

        <div>
            <label class="block mb-1 text-gray-700">Email</label>
            <input id="email" type="email" class="w-full bg-white border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-400 outline-none" required>
        </div>

        <div>
            <label class="block mb-1 text-gray-700">Phone</label>
            <input id="phone" class="w-full bg-white border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-400 outline-none" required>
        </div>

        <div>
            <label class="block mb-1 text-gray-700">Password</label>
            <input id="password" type="password" class="w-full bg-white border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-400 outline-none" required>
        </div>

        <button class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-lg font-semibold transition shadow-md hover:shadow-lg">
            Add Officer
        </button>

    </form>

    <a href="admin-officers.html" class="text-blue-600 hover:underline mt-4 block">
        ← Back to Officers
    </a>

</div>

<script>
    document.getElementById("addOfficerForm").addEventListener("submit", async e => {
        e.preventDefault();

        const officer = {
            fullName: fullName.value,
            email: email.value,
            phone: phone.value,
            password: password.value
        };

        const res = await fetch("http://localhost:8080/api/admin/officers/add", {
            method: "POST",
            headers: { "Authorization": "Bearer " + token, "Content-Type": "application/json" },
            body: JSON.stringify(officer)
        });

        if (!res.ok) {
            alert("Failed to add officer.");
            return;
        }

        alert("Officer added!");
        window.location.href = "admin-officers.html";
    });
</script>

</body>
</html>
