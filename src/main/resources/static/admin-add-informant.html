<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Informant</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 text-gray-900 p-10 flex flex-col items-center min-h-screen">

<script>
    // TOKEN & ROLE CHECK
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "ADMIN") {
        window.location.href = "login.html";
    }
</script>

<h2 class="text-3xl font-bold mb-6 text-blue-600">Add Informant</h2>

<form id="addForm" class="space-y-4 bg-white p-6 rounded-3xl shadow-lg border border-gray-200 w-full max-w-lg">

    <input type="text" id="name" placeholder="Name"
           class="w-full p-3 rounded bg-white border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none" required>

    <input type="text" id="phone" placeholder="Phone"
           class="w-full p-3 rounded bg-white border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none" required>

    <input type="email" id="email" placeholder="Email"
           class="w-full p-3 rounded bg-white border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none">

    <input type="text" id="address" placeholder="Address"
           class="w-full p-3 rounded bg-white border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none">

    <input type="password" id="password" placeholder="Password"
           class="w-full p-3 rounded bg-white border border-gray-300 focus:ring-2 focus:ring-blue-400 outline-none" required>

    <button type="submit"
            class="w-full py-3 bg-blue-600 hover:bg-blue-700 rounded-lg text-white font-semibold shadow-md hover:shadow-lg transition">
        Add Informant
    </button>
</form>

<script>
    document.getElementById("addForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            name: document.getElementById("name").value,
            phone: document.getElementById("phone").value,
            email: document.getElementById("email").value,
            address: document.getElementById("address").value,
            password: document.getElementById("password").value
        };

        try {
            const res = await fetch("http://localhost:8080/api/informants", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify(data)
            });

            if (!res.ok) throw new Error(await res.text());

            alert("Informant added successfully!");
            window.location.href = "admin-informant.html";
            
        } catch (err) {
            console.error(err);
            alert("Error adding informant.");
        }
    });
</script>

</body>
</html>
