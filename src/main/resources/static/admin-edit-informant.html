<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Edit Informant</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>
    const BASE_URL = "http://localhost:8080";
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");

    function isTokenExpired(t) {
        try { const p = JSON.parse(atob(t.split('.')[1])); return p.exp * 1000 < Date.now(); }
        catch { return true; }
    }
    if (!token || role !== "ADMIN" || isTokenExpired(token)) {
        localStorage.clear(); window.location.href = "login.html";
    }
</script>

<!-- Sidebar -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-1">
            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
            <h2 class="text-xl font-extrabold">SITIMS</h2>
        </div>
        <p class="text-blue-400 text-xs ml-9">Admin Panel</p>
    </div>
    <nav class="space-y-1 flex-1">
        <a href="admin-dashboard.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="admin-incidents.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-exclamation-triangle"></i> Incidents</a>
        <a href="admin-officers.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-person-badge"></i> Officers</a>
        <a href="admin-user.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-people"></i> Users</a>
        <a href="admin-informant.html" class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold"><i class="bi bi-incognito"></i> Informants</a>
        <a href="admin-tips.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-lightbulb"></i> Tips</a>
    </nav>
    <button onclick="logout()" class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">
        <i class="bi bi-box-arrow-left"></i> Logout
    </button>
</aside>

<!-- Main -->
<main class="flex-1 p-8">
    <div class="max-w-2xl mx-auto">

        <a href="admin-informant.html" class="flex items-center gap-2 text-blue-600 hover:underline mb-6 text-sm font-semibold">
            <i class="bi bi-arrow-left"></i> Back to Informants
        </a>

        <!-- Details Card -->
        <div class="bg-white rounded-3xl shadow-lg p-8 mb-6 border border-gray-100">
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-yellow-100 p-3 rounded-xl">
                    <i class="bi bi-pencil-fill text-yellow-600 text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Edit Informant</h2>
                    <p class="text-gray-400 text-sm">Update informant personal details</p>
                </div>
            </div>

            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i><span id="errorText"></span>
            </div>
            <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-check-circle-fill"></i><span id="successText"></span>
            </div>

            <form id="editForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                    <div class="relative">
                        <i class="bi bi-person absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="name" required
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Phone</label>
                    <div class="relative">
                        <i class="bi bi-phone absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="phone"
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                    <div class="relative">
                        <i class="bi bi-envelope absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="email" id="email"
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Address</label>
                    <div class="relative">
                        <i class="bi bi-geo-alt absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="address"
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-semibold transition shadow flex items-center justify-center gap-2">
                    <i class="bi bi-check-circle"></i>
                    <span id="btnText">Update Details</span>
                </button>
            </form>
        </div>

        <!-- Password Update Card -->
        <div class="bg-white rounded-3xl shadow-lg p-8 border border-gray-100">
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-red-100 p-3 rounded-xl">
                    <i class="bi bi-shield-lock-fill text-red-500 text-2xl"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800">Update Password</h2>
                    <p class="text-gray-400 text-sm">Change informant login password</p>
                </div>
            </div>

            <div id="pwdErrorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i><span id="pwdErrorText"></span>
            </div>
            <div id="pwdSuccessMsg" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-check-circle-fill"></i><span>Password updated successfully!</span>
            </div>

            <form id="passwordForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">New Password</label>
                    <div class="relative">
                        <i class="bi bi-lock absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="newPassword" placeholder="Enter new password"
                               class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                        <button type="button" onclick="togglePwd('newPassword','eye1')"
                                class="absolute right-3 top-3.5 text-gray-400 hover:text-blue-500">
                            <i class="bi bi-eye" id="eye1"></i>
                        </button>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                    <div class="relative">
                        <i class="bi bi-lock-fill absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password"
                               class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                        <button type="button" onclick="togglePwd('confirmPassword','eye2')"
                                class="absolute right-3 top-3.5 text-gray-400 hover:text-blue-500">
                            <i class="bi bi-eye" id="eye2"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" id="pwdBtn"
                        class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-semibold transition shadow flex items-center justify-center gap-2">
                    <i class="bi bi-shield-lock"></i>
                    <span id="pwdBtnText">Update Password</span>
                </button>
            </form>
        </div>

    </div>
</main>

<script>
    function togglePwd(inputId, iconId) {
        const input = document.getElementById(inputId);
        const icon = document.getElementById(iconId);
        input.type = input.type === "password" ? "text" : "password";
        icon.className = input.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
    }

    function showError(msg) {
        document.getElementById("errorText").innerText = msg;
        document.getElementById("errorMsg").classList.remove("hidden");
        document.getElementById("successMsg").classList.add("hidden");
    }

    function showSuccess(msg) {
        document.getElementById("successText").innerText = msg;
        document.getElementById("successMsg").classList.remove("hidden");
        document.getElementById("errorMsg").classList.add("hidden");
    }

    // ✅ Load informant data
    async function loadInformant() {
        try {
            const res = await fetch(`${BASE_URL}/api/informants/${id}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            if (!res.ok) throw new Error();
            const data = await res.json();
            document.getElementById("name").value = data.name || "";
            document.getElementById("phone").value = data.phone || "";
            document.getElementById("email").value = data.email || "";
            document.getElementById("address").value = data.address || "";
        } catch {
            showError("Failed to load informant details.");
        }
    }

    // ✅ Update details
    document.getElementById("editForm").addEventListener("submit", async e => {
        e.preventDefault();
        document.getElementById("errorMsg").classList.add("hidden");

        document.getElementById("submitBtn").disabled = true;
        document.getElementById("btnText").innerText = "Updating...";

        const data = {
            name: document.getElementById("name").value.trim(),
            phone: document.getElementById("phone").value.trim(),
            email: document.getElementById("email").value.trim(),
            address: document.getElementById("address").value.trim()
        };

        try {
            const res = await fetch(`${BASE_URL}/api/informants/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify(data)
            });
            if (!res.ok) throw new Error();
            showSuccess("Informant details updated successfully!");
        } catch {
            showError("Failed to update informant.");
        } finally {
            document.getElementById("submitBtn").disabled = false;
            document.getElementById("btnText").innerText = "Update Details";
        }
    });

    // ✅ Update password
    document.getElementById("passwordForm").addEventListener("submit", async e => {
        e.preventDefault();
        document.getElementById("pwdErrorMsg").classList.add("hidden");
        document.getElementById("pwdSuccessMsg").classList.add("hidden");

        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmPassword").value;

        if (!newPassword || !confirmPassword) {
            document.getElementById("pwdErrorText").innerText = "Both fields are required.";
            document.getElementById("pwdErrorMsg").classList.remove("hidden");
            return;
        }
        if (newPassword !== confirmPassword) {
            document.getElementById("pwdErrorText").innerText = "Passwords do not match.";
            document.getElementById("pwdErrorMsg").classList.remove("hidden");
            return;
        }
        if (newPassword.length < 6) {
            document.getElementById("pwdErrorText").innerText = "Minimum 6 characters required.";
            document.getElementById("pwdErrorMsg").classList.remove("hidden");
            return;
        }

        document.getElementById("pwdBtn").disabled = true;
        document.getElementById("pwdBtnText").innerText = "Updating...";

        try {
            const res = await fetch(`${BASE_URL}/api/informants/${id}`, {
                method: "PUT",
                headers: { "Content-Type": "application/json", "Authorization": "Bearer " + token },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    phone: document.getElementById("phone").value,
                    email: document.getElementById("email").value,
                    address: document.getElementById("address").value,
                    password: newPassword
                })
            });
            if (!res.ok) throw new Error();
            document.getElementById("pwdSuccessMsg").classList.remove("hidden");
            document.getElementById("newPassword").value = "";
            document.getElementById("confirmPassword").value = "";
        } catch {
            document.getElementById("pwdErrorText").innerText = "Failed to update password.";
            document.getElementById("pwdErrorMsg").classList.remove("hidden");
        } finally {
            document.getElementById("pwdBtn").disabled = false;
            document.getElementById("pwdBtnText").innerText = "Update Password";
        }
    });

    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    if (id) loadInformant();
    else showError("No informant ID provided.");
</script>

</body>
</html>
