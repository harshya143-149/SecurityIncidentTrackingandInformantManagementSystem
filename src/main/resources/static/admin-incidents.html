<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Manage Incidents</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");

    const role = localStorage.getItem("role");

    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    if (!token || role !== "ADMIN" || isTokenExpired(token)) {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">

        <div class="mb-6">

            <div class="flex items-center gap-3 mb-1">

                <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

                <h2 class="text-xl font-extrabold">
                    SITIMS
                </h2>

            </div>

            <p class="text-blue-400 text-xs ml-9">
                Admin Panel
            </p>

        </div>

        <nav class="space-y-1 flex-1">

            <a href="admin-dashboard.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800">

                Dashboard

            </a>

            <a href="admin-incidents.html"
               class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">

                Incidents

            </a>

            <a href="admin-officers.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800">

                Officers

            </a>

            <a href="admin-user.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800">

                Users

            </a>

            <a href="admin-informant.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800">

                Informants

            </a>

            <a href="admin-tips.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800">

                Tips

            </a>

        </nav>

        <button onclick="logout()"
                class="bg-red-600 p-3 rounded mt-4 hover:bg-red-700 transition">

            Logout

        </button>

    </aside>

    <!-- Main -->
    <main class="flex-1 p-8 overflow-y-auto">

        <!-- Top -->
        <div class="flex justify-between items-center mb-6">

            <div>

                <h1 class="text-3xl font-bold">
                    All Incidents
                </h1>

                <p class="text-gray-500 text-sm">
                    Manage and assign incidents
                </p>

            </div>

            <select id="statusFilter"
                    onchange="filterStatus()"
                    class="border border-gray-300 rounded-xl px-4 py-2 bg-white">

                <option value="ALL">All Status</option>
                <option value="PENDING">Pending</option>
                <option value="ASSIGNED">Assigned</option>
                <option value="IN_PROGRESS">In Progress</option>
                <option value="RESOLVED">Resolved</option>
                <option value="CLOSED">Closed</option>

            </select>

        </div>

        <!-- Active -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden mb-8">

            <div class="bg-blue-600 text-white p-4 flex justify-between items-center">

                <h2 class="font-bold text-lg">
                    Active Incidents
                </h2>

                <span id="activeCount"
                      class="bg-white/20 px-3 py-1 rounded-full text-sm">
                </span>

            </div>

            <div class="overflow-x-auto">

                <table class="w-full text-sm">

                    <thead class="bg-blue-50 text-gray-700">

                    <tr>

                        <th class="p-4 text-left">No.</th>
                        <th class="p-4 text-left">Title</th>
                        <th class="text-left">Location</th>
                        <th class="text-left">Severity</th>
                        <th class="text-left">Status</th>
                        <th class="text-left">Officer</th>
                        <th class="text-left">Actions</th>

                    </tr>

                    </thead>

                    <tbody id="adminTable"></tbody>

                </table>

            </div>

        </div>

        <!-- Resolved -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">

            <div class="bg-green-600 text-white p-4 flex justify-between items-center">

                <h2 class="font-bold text-lg">
                    Resolved / Closed
                </h2>

                <span id="resolvedCount"
                      class="bg-white/20 px-3 py-1 rounded-full text-sm">
                </span>

            </div>

            <div class="overflow-x-auto">

                <table class="w-full text-sm">

                    <thead class="bg-green-50 text-gray-700">

                    <tr>

                        <th class="p-4 text-left">No.</th>
                        <th class="p-4 text-left">Title</th>
                        <th class="text-left">Location</th>
                        <th class="text-left">Severity</th>
                        <th class="text-left">Status</th>
                        <th class="text-left">Officer</th>
                        <th class="text-left">Actions</th>

                    </tr>

                    </thead>

                    <tbody id="resolvedTableBody"></tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<!-- Assign Popup -->
<div id="assignPopup"
     class="fixed inset-0 hidden bg-black/50 items-center justify-center z-50">

    <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">

        <h2 class="text-xl font-bold mb-5">
            Assign Officer
        </h2>

        <select id="officerSelect"
                class="w-full border border-gray-300 rounded-xl p-3 mb-5">
        </select>

        <div class="flex justify-end gap-3">

            <button onclick="closeAssignPopup()"
                    class="px-4 py-2 bg-gray-200 hover:bg-gray-300 rounded-xl">

                Cancel

            </button>

            <button onclick="assignOfficer()"
                    class="px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl">

                Assign

            </button>

        </div>

    </div>

</div>

<script>

    let allIncidents = [];

    let selectedIncidentId = null;

    const severityColors = {

        LOW: "text-green-600 font-semibold",
        MEDIUM: "text-yellow-600 font-semibold",
        HIGH: "text-orange-600 font-semibold",
        CRITICAL: "text-red-600 font-semibold"
    };

    const statusColors = {

        PENDING: "text-yellow-600 font-semibold",
        ASSIGNED: "text-indigo-600 font-semibold",
        IN_PROGRESS: "text-blue-600 font-semibold",
        RESOLVED: "text-green-600 font-semibold",
        CLOSED: "text-gray-600 font-semibold"
    };

    async function loadAllIncidents() {

        try {

            const res = await fetch(`${BASE_URL}/api/incidents/all`, {

                headers: {
                    Authorization: "Bearer " + token
                }
            });

            allIncidents = await res.json();

            renderTable(allIncidents);

        } catch (err) {

            console.error(err);

            alert("Failed to load incidents");
        }
    }

    function renderTable(list) {

        const activeTable =
            document.getElementById("adminTable");

        const resolvedTable =
            document.getElementById("resolvedTableBody");

        activeTable.innerHTML = "";

        resolvedTable.innerHTML = "";

        let activeCount = 0;

        let resolvedCount = 0;

        let activeSerial = 1;

        let resolvedSerial = 1;

        const uniqueList =
            Array.from(new Map(list.map(i => [i.id, i])).values());

        uniqueList.forEach(i => {

            const sev =
                severityColors[i.severity] || "";

            const sta =
                statusColors[i.status] || "";

            const officer =
                i.assignedOfficer?.fullName || "Not Assigned";

            // ACTIVE INCIDENTS
            if (i.status !== "RESOLVED" && i.status !== "CLOSED") {

                activeCount++;

                activeTable.innerHTML += `

                    <tr class="border-b hover:bg-gray-50 transition">

                        <td class="p-4 font-semibold text-gray-600">
                            ${activeSerial++}
                        </td>

                        <td class="p-4 font-medium">
                            ${i.title}
                        </td>

                        <td>
                            ${i.location || "-"}
                        </td>

                        <td class="${sev}">
                            ${i.severity}
                        </td>

                        <td class="${sta}">
                            ${i.status}
                        </td>

                        <td>
                            ${officer}
                        </td>

                        <td>

                            <div class="flex flex-wrap gap-2 py-3">

                                <button
                                    onclick="openAssignPopup(${i.id})"
                                    class="bg-blue-500 hover:bg-blue-600 text-white px-3 py-1 rounded-lg text-xs">

                                    Assign

                                </button>

                                <button
                                    onclick="viewHistory(${i.id})"
                                    class="bg-purple-500 hover:bg-purple-600 text-white px-3 py-1 rounded-lg text-xs">

                                    History

                                </button>

                                <button
                                    onclick="deleteIncident(${i.id})"
                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs">

                                    Delete

                                </button>

                            </div>

                        </td>

                    </tr>
                `;

            }

            // RESOLVED INCIDENTS
            else {

                resolvedCount++;

                resolvedTable.innerHTML += `

                    <tr class="border-b hover:bg-gray-50 transition">

                        <td class="p-4 font-semibold text-gray-600">
                            ${resolvedSerial++}
                        </td>

                        <td class="p-4 font-medium">
                            ${i.title}
                        </td>

                        <td>
                            ${i.location || "-"}
                        </td>

                        <td class="${sev}">
                            ${i.severity}
                        </td>

                        <td class="${sta}">
                            ${i.status}
                        </td>

                        <td>
                            ${officer}
                        </td>

                        <td>

                            <div class="flex flex-wrap gap-2 py-3">

                                <button
                                    onclick="openAssignPopup(${i.id})"
                                    class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded-lg text-xs">

                                    Reassign

                                </button>

                                <button
                                    onclick="viewHistory(${i.id})"
                                    class="bg-purple-500 hover:bg-purple-600 text-white px-3 py-1 rounded-lg text-xs">

                                    History

                                </button>

                                <button
                                    onclick="deleteIncident(${i.id})"
                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs">

                                    Delete

                                </button>

                            </div>

                        </td>

                    </tr>
                `;
            }
        });

        document.getElementById("activeCount").innerText =
            activeCount;

        document.getElementById("resolvedCount").innerText =
            resolvedCount;
    }

    function filterStatus() {

        const val =
            document.getElementById("statusFilter").value;

        const filtered =
            val === "ALL"
                ? allIncidents
                : allIncidents.filter(i => i.status === val);

        renderTable(filtered);
    }

    function viewHistory(id) {

        window.location.href =
            `incident-history.html?id=${id}`;
    }

    function openAssignPopup(id) {

        selectedIncidentId = id;

        fetch(`${BASE_URL}/api/admin/officers`, {

            headers: {
                Authorization: "Bearer " + token
            }

        })
        .then(r => r.json())
        .then(data => {

            document.getElementById("officerSelect").innerHTML =
                `
                    <option value="">
                        -- Select Officer --
                    </option>
                ` +
                data.map(o => `
                    <option value="${o.id}">
                        ${o.fullName || o.name || o.email}
                    </option>
                `).join("");

            const popup =
                document.getElementById("assignPopup");

            popup.classList.remove("hidden");

            popup.style.display = "flex";
        });
    }

    function closeAssignPopup() {

        const popup =
            document.getElementById("assignPopup");

        popup.classList.add("hidden");

        popup.style.display = "none";
    }

    async function assignOfficer() {

        const officerId =
            document.getElementById("officerSelect").value;

        if (!officerId) {

            alert("Please select officer");

            return;
        }

        try {

            const res = await fetch(`${BASE_URL}/api/incidents/assign`, {

                method: "PUT",

                headers: {
                    "Content-Type": "application/json",
                    Authorization: "Bearer " + token
                },

                body: JSON.stringify({
                    incidentId: selectedIncidentId,
                    officerId: Number(officerId)
                })
            });

            if (!res.ok) {

                const msg = await res.text();

                throw new Error(msg);
            }

            alert("Officer assigned successfully");

            closeAssignPopup();

            loadAllIncidents();

        } catch (err) {

            console.error(err);

            alert("Failed to assign officer: " + err.message);
        }
    }

    async function deleteIncident(id) {

        try {

            const confirmDelete =
                confirm("Are you sure you want to delete this incident?");

            if (!confirmDelete) return;

            const res = await fetch(`${BASE_URL}/api/incidents/delete/${id}`, {

                method: "DELETE",

                headers: {
                    Authorization: "Bearer " + token
                }
            });

            if (!res.ok) {

                const msg = await res.text();

                console.error(msg);

                alert("Delete failed! " + msg);

                return;
            }

            alert("Incident deleted successfully");

            loadAllIncidents();

        } catch (err) {

            console.error(err);

            alert("Network error");
        }
    }

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

    loadAllIncidents();

</script>

</body>
</html>
