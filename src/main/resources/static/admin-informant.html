<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Manage Informants</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");

    const role = localStorage.getItem("role");

    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    if (!token || role !== "ADMIN" || isTokenExpired(token)) {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">

        <div class="mb-6">

            <div class="flex items-center gap-3 mb-1">

                <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

                <h2 class="text-xl font-extrabold">
                    SITIMS
                </h2>

            </div>

            <p class="text-blue-400 text-xs ml-9">
                Admin Panel
            </p>

        </div>

        <nav class="space-y-1 flex-1">

            <a href="admin-dashboard.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-speedometer2"></i>

                Dashboard

            </a>

            <a href="admin-incidents.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-exclamation-triangle"></i>

                Incidents

            </a>

            <a href="admin-officers.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-person-badge"></i>

                Officers

            </a>

            <a href="admin-user.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-people"></i>

                Users

            </a>

            <a href="admin-informant.html"
               class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">

                <i class="bi bi-incognito"></i>

                Informants

            </a>

            <a href="admin-tips.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-lightbulb"></i>

                Tips

            </a>

        </nav>

        <button onclick="logout()"
                class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

            <i class="bi bi-box-arrow-left"></i>

            Logout

        </button>

    </aside>

    <!-- Main -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">

            <div>

                <h1 class="text-3xl font-bold text-gray-800">
                    Informants
                </h1>

                <p class="text-gray-500 text-sm mt-1">
                    Manage confidential informant records
                </p>

            </div>

            <a href="admin-add-informant.html"
               class="flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-xl font-semibold transition shadow">

                <i class="bi bi-plus-circle"></i>

                Add Informant

            </a>

        </div>

        <!-- Toast -->
        <div id="toast"
             class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-semibold text-sm flex items-center gap-2">
        </div>

        <!-- Table -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">

            <div class="bg-blue-600 px-6 py-4 flex justify-between items-center">

                <h2 class="text-white font-bold text-lg flex items-center gap-2">

                    <i class="bi bi-person-fill-lock"></i>

                    Informant Records

                </h2>

                <span class="bg-blue-500 text-white text-xs px-3 py-1 rounded-full"
                      id="countBadge">

                    Loading...

                </span>

            </div>

            <div class="overflow-x-auto">

                <table class="w-full">

                    <thead class="bg-blue-50 text-blue-700 text-xs uppercase">

                    <tr>

                        <th class="px-6 py-3 text-left">
                            No.
                        </th>

                        <th class="px-6 py-3 text-left">
                            Name
                        </th>

                        <th class="px-6 py-3 text-left">
                            Phone
                        </th>

                        <th class="px-6 py-3 text-left">
                            Email
                        </th>

                        <th class="px-6 py-3 text-left">
                            Address
                        </th>

                        <th class="px-6 py-3 text-left">
                            Actions
                        </th>

                    </tr>

                    </thead>

                    <tbody id="informantTable"
                           class="divide-y divide-gray-100 text-sm">

                    <tr>

                        <td colspan="6"
                            class="px-6 py-10 text-center text-gray-400">

                            <i class="bi bi-arrow-repeat animate-spin text-2xl block mb-2"></i>

                            Loading informants...

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<script>

    function showToast(msg, success = true) {

        const t = document.getElementById("toast");

        t.className =
            `fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-semibold text-sm flex items-center gap-2 ${
                success ? "bg-green-500" : "bg-red-500"
            }`;

        t.innerHTML =
            `<i class="bi bi-${success ? "check-circle" : "x-circle"}"></i> ${msg}`;

        t.classList.remove("hidden");

        setTimeout(() => {

            t.classList.add("hidden");

        }, 3000);
    }

    async function loadInformants() {

        try {

            const res = await fetch(`${BASE_URL}/api/informants`, {

                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401) {

                localStorage.clear();

                window.location.href = "login.html";

                return;
            }

            const data = await res.json();

            document.getElementById("countBadge").innerText =
                `${data.length} records`;

            const tbody =
                document.getElementById("informantTable");

            if (!data.length) {

                tbody.innerHTML = `

                    <tr>

                        <td colspan="6"
                            class="px-6 py-10 text-center">

                            <i class="bi bi-person-x text-4xl text-gray-300 block mb-3"></i>

                            <p class="text-gray-400">
                                No informants found. Add one to get started.
                            </p>

                        </td>

                    </tr>
                `;

                return;
            }

            tbody.innerHTML = data.map((i, index) => `

                <tr class="hover:bg-gray-50 transition">

                    <!-- NUMBER -->
                    <td class="px-6 py-4 font-semibold text-gray-700">

                        ${index + 1}

                    </td>

                    <!-- NAME -->
                    <td class="px-6 py-4 font-semibold">

                        ${i.name}

                    </td>

                    <!-- PHONE -->
                    <td class="px-6 py-4 text-gray-600">

                        ${i.phone || "—"}

                    </td>

                    <!-- EMAIL -->
                    <td class="px-6 py-4 text-gray-600">

                        ${i.email || "—"}

                    </td>

                    <!-- ADDRESS -->
                    <td class="px-6 py-4 text-gray-600">

                        ${i.address || "—"}

                    </td>

                    <!-- ACTIONS -->
                    <td class="px-6 py-4">

                        <div class="flex gap-2">

                            <a href="admin-edit-informant.html?id=${i.id}"
                               class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded-lg text-xs font-semibold transition">

                                <i class="bi bi-pencil mr-1"></i>

                                Edit

                            </a>

                            <button onclick="deleteInformant(${i.id})"
                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs font-semibold transition">

                                <i class="bi bi-trash mr-1"></i>

                                Delete

                            </button>

                        </div>

                    </td>

                </tr>

            `).join("");

        } catch (err) {

            document.getElementById("informantTable").innerHTML = `

                <tr>

                    <td colspan="6"
                        class="px-6 py-6 text-center text-red-400">

                        Failed to load informants.

                    </td>

                </tr>
            `;
        }
    }

    async function deleteInformant(id) {

        if (!confirm("Delete this informant? This cannot be undone.")) return;

        try {

            const res = await fetch(`${BASE_URL}/api/informants/${id}`, {

                method: "DELETE",

                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!res.ok) throw new Error();

            showToast("Informant deleted successfully.");

            loadInformants();

        } catch {

            showToast("Failed to delete informant.", false);
        }
    }

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

    loadInformants();

</script>

</body>
</html>
