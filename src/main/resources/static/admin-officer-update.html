<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Add / Update Officer</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>
    const BASE_URL = "http://localhost:8080";
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    function isTokenExpired(t) {
        try { const p = JSON.parse(atob(t.split('.')[1])); return p.exp * 1000 < Date.now(); }
        catch { return true; }
    }

    if (!token || role !== "ADMIN" || isTokenExpired(token)) {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>

<!-- Sidebar -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-1">
            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
            <h2 class="text-xl font-extrabold">SITIMS</h2>
        </div>
        <p class="text-blue-400 text-xs ml-9">Admin Panel</p>
    </div>

    <nav class="space-y-1 flex-1">
        <a href="admin-dashboard.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="admin-incidents.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-exclamation-triangle"></i> Incidents</a>
        <a href="admin-officers.html" class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold"><i class="bi bi-person-badge"></i> Officers</a>
        <a href="admin-user.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-people"></i> Users</a>
        <a href="admin-informant.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-incognito"></i> Informants</a>
        <a href="admin-tips.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-lightbulb"></i> Tips</a>
    </nav>

    <button onclick="logout()" class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">
        <i class="bi bi-box-arrow-left"></i> Logout
    </button>
</aside>

<!-- Main -->
<main class="flex-1 p-8 flex items-start justify-center">
    <div class="w-full max-w-lg">

        <a href="admin-officers.html" class="flex items-center gap-2 text-blue-600 hover:underline mb-6 text-sm font-semibold">
            <i class="bi bi-arrow-left"></i> Back to Officers
        </a>

        <div class="bg-white rounded-3xl shadow-lg p-8 border border-gray-100">

            <div class="flex items-center gap-3 mb-6">
                <div class="bg-blue-100 p-3 rounded-xl">
                    <i class="bi bi-person-gear text-blue-600 text-2xl" id="formIcon"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800" id="formTitle">Add New Officer</h2>
                    <p class="text-gray-400 text-sm" id="formSub">Create a new officer account</p>
                </div>
            </div>

            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="errorText"></span>
            </div>

            <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-check-circle-fill"></i>
                <span id="successText"></span>
            </div>

            <form id="officerForm" class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                    <input type="text" id="name" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                    <input type="email" id="email" required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <input type="password" id="password"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400">
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold">
                    <span id="btnText">Add Officer</span>
                </button>

            </form>
        </div>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const officerId = params.get("id");
    const isEdit = !!officerId;

    if (isEdit) {
        document.getElementById("formTitle").innerText = "Update Officer";
        document.getElementById("btnText").innerText = "Update Officer";
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

    document.getElementById("officerForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            name: document.getElementById("name").value,
            email: document.getElementById("email").value,
            password: document.getElementById("password").value
        };

        let url = isEdit
            ? `${BASE_URL}/api/admin/officers/${officerId}`
            : `${BASE_URL}/api/admin/officers`;

        let method = isEdit ? "PUT" : "POST";

        const res = await fetch(url, {
            method,
            headers: {
                "Authorization": "Bearer " + token,
                "Content-Type": "application/json"
            },
            body: JSON.stringify(data)
        });

        if (res.ok) {
            alert(isEdit ? "Officer Updated" : "Officer Created");
            window.location.href = "admin-officers.html";
        } else {
            alert("Error occurred");
        }
    });
</script>

</body>
</html>
