<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Add / Update Officer</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");

    const role = localStorage.getItem("role");

    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    if (!token || role !== "ADMIN" || isTokenExpired(token)) {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<!-- SIDEBAR -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl min-h-screen">

    <div class="mb-6">

        <div class="flex items-center gap-3 mb-1">

            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

            <h2 class="text-xl font-extrabold">
                SITIMS
            </h2>

        </div>

        <p class="text-blue-400 text-xs ml-9">
            Admin Panel
        </p>

    </div>

    <nav class="space-y-1 flex-1">

        <a href="admin-dashboard.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-speedometer2"></i>
            Dashboard

        </a>

        <a href="admin-incidents.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-exclamation-triangle"></i>
            Incidents

        </a>

        <a href="admin-officers.html"
           class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">

            <i class="bi bi-person-badge"></i>
            Officers

        </a>

        <a href="admin-user.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-people"></i>
            Users

        </a>

        <a href="admin-informant.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-incognito"></i>
            Informants

        </a>

        <a href="admin-tips.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-lightbulb"></i>
            Tips

        </a>

    </nav>

    <button onclick="logout()"
            class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

        <i class="bi bi-box-arrow-left"></i>
        Logout

    </button>

</aside>

<!-- MAIN -->
<main class="flex-1 p-8 flex items-start justify-center">

    <div class="w-full max-w-2xl">

        <!-- BACK -->
        <a href="admin-officers.html"
           class="inline-flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold mb-6">

            <i class="bi bi-arrow-left"></i>
            Back to Officers

        </a>

        <!-- CARD -->
        <div class="bg-white rounded-3xl shadow-xl border border-gray-200 overflow-hidden">

            <!-- TOP -->
            <div class="bg-gradient-to-r from-blue-700 to-blue-900 px-8 py-6 text-white">

                <div class="flex items-center gap-4">

                    <div class="bg-white/20 p-4 rounded-2xl">

                        <i class="bi bi-person-gear text-3xl"></i>

                    </div>

                    <div>

                        <h1 id="formTitle"
                            class="text-3xl font-bold">
                            Add New Officer
                        </h1>

                        <p id="formSub"
                           class="text-blue-100 text-sm mt-1">
                            Create a new officer account
                        </p>

                    </div>

                </div>

            </div>

            <!-- FORM -->
            <div class="p-8">

                <!-- ERROR -->
                <div id="errorMsg"
                     class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">

                    <i class="bi bi-exclamation-circle-fill"></i>

                    <span id="errorText"></span>

                </div>

                <!-- SUCCESS -->
                <div id="successMsg"
                     class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">

                    <i class="bi bi-check-circle-fill"></i>

                    <span id="successText"></span>

                </div>

                <form id="officerForm"
                      class="space-y-6">

                    <!-- NAME -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Full Name
                        </label>

                        <div class="relative">

                            <i class="bi bi-person absolute left-4 top-4 text-gray-400"></i>

                            <input type="text"
                                   id="name"
                                   required
                                   placeholder="Enter officer full name"
                                   class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                        </div>

                    </div>

                    <!-- EMAIL -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Email Address
                        </label>

                        <div class="relative">

                            <i class="bi bi-envelope absolute left-4 top-4 text-gray-400"></i>

                            <input type="email"
                                   id="email"
                                   required
                                   placeholder="Enter email address"
                                   class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                        </div>

                    </div>

                    <!-- PHONE -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Phone Number
                        </label>

                        <div class="relative">

                            <i class="bi bi-telephone absolute left-4 top-4 text-gray-400"></i>

                            <input type="text"
                                   id="phone"
                                   placeholder="Enter phone number"
                                   class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                        </div>

                    </div>

                    <!-- PASSWORD -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Password
                        </label>

                        <div class="relative">

                            <i class="bi bi-lock absolute left-4 top-4 text-gray-400"></i>

                            <input type="password"
                                   id="password"
                                   placeholder="Enter password"
                                   class="w-full pl-12 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none">

                        </div>

                        <p class="text-xs text-gray-400 mt-2">
                            Leave empty while updating if you don't want to change password
                        </p>

                    </div>

                    <!-- BUTTON -->
                    <button type="submit"
                            id="submitBtn"
                            class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold shadow-md transition">

                        <span id="btnText">
                            Add Officer
                        </span>

                    </button>

                </form>

            </div>

        </div>

    </div>

</main>

<script>

    const params = new URLSearchParams(window.location.search);

    const officerId = params.get("id");

    const isEdit = !!officerId;

    if (isEdit) {

        document.getElementById("formTitle").innerText =
            "Update Officer";

        document.getElementById("formSub").innerText =
            "Update officer account details";

        document.getElementById("btnText").innerText =
            "Update Officer";

        loadOfficer();
    }

    function showError(msg) {

        document.getElementById("errorMsg").classList.remove("hidden");

        document.getElementById("successMsg").classList.add("hidden");

        document.getElementById("errorText").innerText = msg;
    }

    function showSuccess(msg) {

        document.getElementById("successMsg").classList.remove("hidden");

        document.getElementById("errorMsg").classList.add("hidden");

        document.getElementById("successText").innerText = msg;
    }

    async function loadOfficer() {

        try {

            const res = await fetch(`${BASE_URL}/api/admin/officers`, {

                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const officers = await res.json();

            const officer = officers.find(o => o.id == officerId);

            if (!officer) {

                showError("Officer not found");

                return;
            }

            document.getElementById("name").value =
                officer.name || "";

            document.getElementById("email").value =
                officer.email || "";

            document.getElementById("phone").value =
                officer.phone || "";

        } catch {

            showError("Failed to load officer details");
        }
    }

    document.getElementById("officerForm")
        .addEventListener("submit", async (e) => {

        e.preventDefault();

        const data = {

            name: document.getElementById("name").value,

            email: document.getElementById("email").value,

            phone: document.getElementById("phone").value,

            password: document.getElementById("password").value
        };

        try {

            let url = isEdit
                ? `${BASE_URL}/api/admin/officers/${officerId}`
                : `${BASE_URL}/api/admin/officers`;

            let method = isEdit ? "PUT" : "POST";

            const res = await fetch(url, {

                method,

                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },

                body: JSON.stringify(data)
            });

            if (res.ok) {

                showSuccess(
                    isEdit
                    ? "Officer updated successfully"
                    : "Officer created successfully"
                );

                setTimeout(() => {

                    window.location.href =
                        "admin-officers.html";

                }, 1200);

            } else {

                const text = await res.text();

                showError(text || "Operation failed");
            }

        } catch {

            showError("Server error occurred");
        }

    });

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

</body>
</html>
