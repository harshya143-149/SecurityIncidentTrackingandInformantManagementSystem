<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Manage Officers</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">

<script>
    const BASE_URL = "http://localhost:8080";
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    function isTokenExpired(t) {
        try {
            const p = JSON.parse(atob(t.split('.')[1]));
            return p.exp * 1000 < Date.now();
        } catch {
            return true;
        }
    }

    if (!token || role !== "ADMIN" || isTokenExpired(token)) {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">

        <div class="mb-6">

            <div class="flex items-center gap-3 mb-1">
                <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
                <h2 class="text-xl font-extrabold">SITIMS</h2>
            </div>

            <p class="text-blue-400 text-xs ml-9">
                Admin Panel
            </p>

        </div>

        <nav class="space-y-1 flex-1">

            <a href="admin-dashboard.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
                <i class="bi bi-speedometer2"></i>
                Dashboard
            </a>

            <a href="admin-incidents.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
                <i class="bi bi-exclamation-triangle"></i>
                Incidents
            </a>

            <a href="admin-officers.html"
               class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">
                <i class="bi bi-person-badge"></i>
                Officers
            </a>

            <a href="admin-user.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
                <i class="bi bi-people"></i>
                Users
            </a>

            <a href="admin-informant.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
                <i class="bi bi-incognito"></i>
                Informants
            </a>

            <a href="admin-tips.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
                <i class="bi bi-lightbulb"></i>
                Tips
            </a>

        </nav>

        <button onclick="logout()"
                class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

            <i class="bi bi-box-arrow-left"></i>
            Logout

        </button>

    </aside>

    <!-- Main -->
    <main class="flex-1 p-8">

        <!-- Header -->
        <div class="flex justify-between items-center mb-8">

            <div>
                <h1 class="text-3xl font-bold text-gray-800">
                    Officers
                </h1>

                <p class="text-gray-500 text-sm mt-1">
                    Manage all security officers
                </p>
            </div>

            <a href="add-officer.html"
               class="flex items-center gap-2 bg-green-500 hover:bg-green-600 text-white px-5 py-2 rounded-xl font-semibold transition shadow">

                <i class="bi bi-plus-circle"></i>
                Add Officer

            </a>

        </div>

        <!-- Toast -->
        <div id="toast"
             class="hidden fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-semibold text-sm flex items-center gap-2"></div>

        <!-- Table Card -->
        <div class="bg-white rounded-2xl shadow-md overflow-hidden">

            <!-- Top -->
            <div class="bg-blue-600 px-6 py-4 flex justify-between items-center">

                <h2 class="text-white font-bold text-lg flex items-center gap-2">
                    <i class="bi bi-person-badge-fill"></i>
                    Officer List
                </h2>

                <span id="countBadge"
                      class="bg-blue-500 text-white text-xs px-3 py-1 rounded-full">
                    Loading...
                </span>

            </div>

            <!-- Table -->
            <div class="overflow-x-auto">

                <table class="w-full">

                    <thead class="bg-blue-50 text-blue-700 text-xs uppercase">

                    <tr>

                        <th class="px-6 py-3 text-left">
                            No.
                        </th>

                        <th class="px-6 py-3 text-left">
                            Name
                        </th>

                        <th class="px-6 py-3 text-left">
                            Email
                        </th>

                        <th class="px-6 py-3 text-left">
                            Phone
                        </th>

                        <th class="px-6 py-3 text-left">
                            Role
                        </th>

                        <th class="px-6 py-3 text-left">
                            Actions
                        </th>

                    </tr>

                    </thead>

                    <tbody id="officerTable"
                           class="divide-y divide-gray-100 text-sm">

                    <tr>

                        <td colspan="6"
                            class="px-6 py-10 text-center text-gray-400">

                            <i class="bi bi-arrow-repeat animate-spin text-2xl block mb-2"></i>

                            Loading officers...

                        </td>

                    </tr>

                    </tbody>

                </table>

            </div>

        </div>

    </main>

</div>

<script>

    // Toast
    function showToast(msg, success = true) {

        const t = document.getElementById("toast");

        t.className =
            `fixed top-6 right-6 z-50 px-5 py-3 rounded-xl shadow-lg text-white font-semibold text-sm flex items-center gap-2 ${
                success ? "bg-green-500" : "bg-red-500"
            }`;

        t.innerHTML =
            `<i class="bi bi-${success ? "check-circle" : "x-circle"}"></i> ${msg}`;

        t.classList.remove("hidden");

        setTimeout(() => {
            t.classList.add("hidden");
        }, 3000);
    }

    // Load Officers
    async function loadOfficers() {

        try {

            const res = await fetch(`${BASE_URL}/api/admin/officers`, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.status === 401) {

                localStorage.clear();

                window.location.href = "login.html";

                return;
            }

            const officers = await res.json();

            document.getElementById("countBadge").innerText =
                `${officers.length} officers`;

            const tbody = document.getElementById("officerTable");

            // Empty
            if (!officers.length) {

                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="px-6 py-10 text-center">

                            <i class="bi bi-person-x text-4xl text-gray-300 block mb-3"></i>

                            <p class="text-gray-400">
                                No officers found. Add one to get started.
                            </p>

                        </td>
                    </tr>
                `;

                return;
            }

            // Data
            tbody.innerHTML = officers.map((o, index) => `

                <tr class="hover:bg-gray-50 transition">

                    <td class="px-6 py-4 font-semibold text-gray-500">
                        ${index + 1}
                    </td>

                    <td class="px-6 py-4 font-semibold">
                        ${o.name}
                    </td>

                    <td class="px-6 py-4 text-gray-600">
                        ${o.email}
                    </td>

                    <td class="px-6 py-4 text-gray-600">
                        ${o.phone || "—"}
                    </td>

                    <td class="px-6 py-4">

                        <span class="bg-indigo-100 text-indigo-700 text-xs px-2 py-1 rounded-full font-semibold">

                            ${o.role || "OFFICER"}

                        </span>

                    </td>

                    <td class="px-6 py-4">

                        <div class="flex gap-2">

                            <a href="admin-officer-update.html?id=${o.id}"
                               class="bg-yellow-400 hover:bg-yellow-500 text-white px-3 py-1 rounded-lg text-xs font-semibold transition">

                                <i class="bi bi-pencil mr-1"></i>
                                Edit

                            </a>

                            <button onclick="removeOfficer(${o.id})"
                                    class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs font-semibold transition">

                                <i class="bi bi-trash mr-1"></i>
                                Delete

                            </button>

                        </div>

                    </td>

                </tr>

            `).join("");

        } catch (err) {

            document.getElementById("officerTable").innerHTML = `

                <tr>

                    <td colspan="6"
                        class="px-6 py-6 text-center text-red-400">

                        Failed to load officers.

                    </td>

                </tr>

            `;
        }
    }

    // Delete Officer
    async function removeOfficer(id) {

        if (!confirm("Delete this officer? This cannot be undone.")) {
            return;
        }

        try {

            const res = await fetch(`${BASE_URL}/api/admin/officers/${id}`, {

                method: "DELETE",

                headers: {
                    "Authorization": "Bearer " + token
                }

            });

            if (!res.ok) {
                throw new Error();
            }

            showToast("Officer deleted successfully.");

            loadOfficers();

        } catch {

            showToast("Failed to delete officer.", false);

        }
    }

    // Logout
    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

    // Init
    loadOfficers();

</script>

</body>
</html>
