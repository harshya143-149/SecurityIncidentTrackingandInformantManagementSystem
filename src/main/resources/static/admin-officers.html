<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Officers</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 text-gray-900 p-10">

<script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "ADMIN") {
        window.location.href = "login.html";
    }
</script>

<div class="max-w-7xl mx-auto">

    <h2 class="text-3xl font-bold mb-6 text-blue-600">Officers</h2>

    <a href="add-officer.html"
       class="inline-block px-4 py-2 mb-6 bg-green-500 hover:bg-green-600 rounded-lg font-semibold transition">
        + Add Officer
    </a>

    <div class="overflow-x-auto bg-white rounded-2xl shadow-xl border border-gray-200">
        <table class="min-w-full text-left">
            <thead class="bg-blue-100 text-gray-900">
            <tr>
                <th class="p-3">ID</th>
                <th class="p-3">Name</th>
                <th class="p-3">Email</th>
                <th class="p-3">Phone</th>
                <th class="p-3">Actions</th>
            </tr>
            </thead>
            <tbody id="officerTable"></tbody>
        </table>
    </div>
</div>

<script>
    async function loadOfficers() {
        try {
            const res = await fetch("http://localhost:8080/api/admin/officers", {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) throw new Error("Failed to load officers");

            const officers = await res.json();
            const table = document.getElementById("officerTable");

            table.innerHTML = officers.map(o => `
                <tr class="border-b border-gray-200 hover:bg-blue-50 transition">
                    <td class="p-3">${o.id}</td>
                    <td class="p-3">${o.name}</td>
                    <td class="p-3">${o.email}</td>
                    <td class="p-3">${o.phone}</td>
                    <td class="p-3 flex gap-2">
                        <a href="edit-officer.html?id=${o.id}"
                           class="bg-yellow-400 hover:bg-yellow-500 px-3 py-1 rounded text-white text-sm transition">
                            Edit
                        </a>
                        <button onclick="removeOfficer(${o.id})"
                                class="bg-red-500 hover:bg-red-600 px-3 py-1 rounded text-white text-sm transition">
                            Delete
                        </button>
                    </td>
                </tr>
            `).join("");

        } catch (err) {
            console.error(err);
            alert("Error loading officers: " + err.message);
        }
    }

    async function removeOfficer(id) {
        if (!confirm("Delete this officer?")) return;

        try {
            const res = await fetch(`http://localhost:8080/api/admin/officers/${id}`, {
                method: "DELETE",
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) throw new Error("Failed to delete officer");

            alert("Officer deleted successfully");
            loadOfficers();
        } catch (err) {
            console.error(err);
            alert("Error deleting officer: " + err.message);
        }
    }

    loadOfficers();
</script>

</body>
</html>
