<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Incident</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 text-gray-900 p-10">

<script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "ADMIN") {
        alert("Unauthorized!");
        window.location.href = "login.html";
    }

    const id = new URLSearchParams(window.location.search).get("id");
</script>

<div class="max-w-3xl mx-auto bg-white p-8 rounded-2xl shadow-xl border border-gray-200">
    <h1 class="text-3xl font-bold mb-6 text-blue-600 text-center">Update Incident</h1>

    <div class="space-y-4">
        <div>
            <label class="block mb-1 font-semibold text-gray-700">Status</label>
            <select id="status" class="w-full p-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option value="NEW">NEW</option>
                <option value="IN_PROGRESS">IN_PROGRESS</option>
                <option value="RESOLVED">RESOLVED</option>
            </select>
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Severity</label>
            <select id="severity" class="w-full p-3 rounded border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <option>LOW</option>
                <option>MEDIUM</option>
                <option>HIGH</option>
                <option>CRITICAL</option>
            </select>
        </div>

        <button
                onclick="updateIncident()"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 rounded transition">
            Update Incident
        </button>
    </div>
</div>

<script>
    async function loadIncident() {
        try {
            const res = await fetch(`http://localhost:8080/api/incidents/${id}`, {
                headers: { "Authorization": "Bearer " + token }
            });
            const incident = await res.json();
            document.getElementById("status").value = incident.status;
            document.getElementById("severity").value = incident.severity;
        } catch (err) {
            console.error(err);
            alert("Failed to load incident");
        }
    }

    async function updateIncident() {
        const payload = {
            status: document.getElementById("status").value,
            severity: document.getElementById("severity").value
        };

        try {
            const res = await fetch(`http://localhost:8080/api/incidents/${id}`, {
                method: "PUT",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const err = await res.text();
                throw new Error(err);
            }

            alert("Incident updated successfully!");
            window.location.href = "admin-incidents.html";
        } catch (err) {
            console.error(err);
            alert("Failed to update incident: " + err.message);
        }
    }

    loadIncident();
</script>

</body>
</html>
