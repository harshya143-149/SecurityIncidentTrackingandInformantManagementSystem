<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Add / Update User</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>
    const BASE_URL = "http://localhost:8080";
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    function isTokenExpired(t) {
        try { const p = JSON.parse(atob(t.split('.')[1])); return p.exp * 1000 < Date.now(); }
        catch { return true; }
    }
    if (!token || role !== "ADMIN" || isTokenExpired(token)) {
        localStorage.clear(); window.location.href = "login.html";
    }
</script>

<!-- Sidebar -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-1">
            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
            <h2 class="text-xl font-extrabold">SITIMS</h2>
        </div>
        <p class="text-blue-400 text-xs ml-9">Admin Panel</p>
    </div>
    <nav class="space-y-1 flex-1">
        <a href="admin-dashboard.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-speedometer2"></i> Dashboard</a>
        <a href="admin-incidents.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-exclamation-triangle"></i> Incidents</a>
        <a href="admin-officers.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-person-badge"></i> Officers</a>
        <a href="admin-user.html" class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold"><i class="bi bi-people"></i> Users</a>
        <a href="admin-informant.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-incognito"></i> Informants</a>
        <a href="admin-tips.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition"><i class="bi bi-lightbulb"></i> Tips</a>
    </nav>
    <button onclick="logout()" class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">
        <i class="bi bi-box-arrow-left"></i> Logout
    </button>
</aside>

<!-- Main -->
<main class="flex-1 p-8 flex items-start justify-center">
    <div class="w-full max-w-lg">

        <a href="admin-user.html" class="flex items-center gap-2 text-blue-600 hover:underline mb-6 text-sm font-semibold">
            <i class="bi bi-arrow-left"></i> Back to Users
        </a>

        <div class="bg-white rounded-3xl shadow-lg p-8 border border-gray-100">
            <div class="flex items-center gap-3 mb-6">
                <div class="bg-blue-100 p-3 rounded-xl">
                    <i class="bi bi-person-gear text-blue-600 text-2xl" id="formIcon"></i>
                </div>
                <div>
                    <h2 class="text-2xl font-bold text-gray-800" id="formTitle">Add New User</h2>
                    <p class="text-gray-400 text-sm" id="formSub">Create a new user account</p>
                </div>
            </div>

            <!-- Error -->
            <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-exclamation-circle-fill"></i>
                <span id="errorText"></span>
            </div>

            <!-- Success -->
            <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
                <i class="bi bi-check-circle-fill"></i>
                <span id="successText"></span>
            </div>

            <form id="userForm" class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                    <div class="relative">
                        <i class="bi bi-person absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="text" id="name" required placeholder="Enter full name"
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Email</label>
                    <div class="relative">
                        <i class="bi bi-envelope absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="email" id="email" required placeholder="Enter email"
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                </div>

                <!-- Password Section -->
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Password
                        <span id="passwordHint" class="text-gray-400 font-normal text-xs ml-1">(leave empty to keep current)</span>
                    </label>
                    <div class="relative">
                        <i class="bi bi-lock absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="password" placeholder="Enter new password"
                               class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                        <button type="button" onclick="togglePassword()"
                                class="absolute right-3 top-3.5 text-gray-400 hover:text-blue-500">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div id="confirmPwdDiv">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Confirm Password</label>
                    <div class="relative">
                        <i class="bi bi-lock-fill absolute left-3 top-3.5 text-gray-400"></i>
                        <input type="password" id="confirmPassword" placeholder="Confirm new password"
                               class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Role</label>
                    <div class="relative">
                        <i class="bi bi-shield absolute left-3 top-3.5 text-gray-400"></i>
                        <select id="userRole"
                                class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none appearance-none">
                            <option value="USER">USER</option>
                            <option value="OFFICER">OFFICER</option>
                            <option value="ADMIN">ADMIN</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition shadow flex items-center justify-center gap-2 mt-2">
                    <i class="bi bi-check-circle" id="btnIcon"></i>
                    <span id="btnText">Add User</span>
                </button>

            </form>
        </div>
    </div>
</main>

<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("id");
    const isEdit = !!userId;

    // ✅ Update UI for edit mode
    if (isEdit) {
        document.getElementById("formTitle").innerText = "Update User";
        document.getElementById("formSub").innerText = "Edit user details and password";
        document.getElementById("formIcon").className = "bi bi-pencil-fill text-yellow-600 text-2xl";
        document.getElementById("btnText").innerText = "Update User";
        document.getElementById("btnIcon").className = "bi bi-check-circle";
        document.getElementById("passwordHint").innerText = "(leave empty to keep current password)";
    } else {
        document.getElementById("passwordHint").innerText = "(required for new user)";
    }

    function togglePassword() {
        const pwd = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        pwd.type = pwd.type === "password" ? "text" : "password";
        icon.className = pwd.type === "password" ? "bi bi-eye" : "bi bi-eye-slash";
    }

    function showError(msg) {
        document.getElementById("errorText").innerText = msg;
        document.getElementById("errorMsg").classList.remove("hidden");
        document.getElementById("successMsg").classList.add("hidden");
    }

    function showSuccess(msg) {
        document.getElementById("successText").innerText = msg;
        document.getElementById("successMsg").classList.remove("hidden");
        document.getElementById("errorMsg").classList.add("hidden");
    }

    function setLoading(loading) {
        document.getElementById("submitBtn").disabled = loading;
        document.getElementById("btnText").innerText = loading
            ? (isEdit ? "Updating..." : "Adding...")
            : (isEdit ? "Update User" : "Add User");
    }

    // ✅ FIXED — Load user data using correct field names
    async function loadUser() {
        try {
            const res = await fetch(`${BASE_URL}/api/admin/officers/${userId}`, {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) {
                // Try users endpoint if officers fails
                const res2 = await fetch(`${BASE_URL}/api/admin/users/all`, {
                    headers: { "Authorization": "Bearer " + token }
                });
                const users = await res2.json();
                const user = users.find(u => u.id == userId);
                if (user) populateForm(user);
                else showError("User not found.");
                return;
            }

            const user = await res.json();
            populateForm(user);

        } catch (err) {
            showError("Failed to load user details.");
        }
    }

    function populateForm(user) {
        // ✅ FIXED — was user.fullName before which caused undefined
        // UserDTO returns "name" not "fullName"
        document.getElementById("name").value = user.name || user.fullName || "";
        document.getElementById("email").value = user.email || "";
        document.getElementById("userRole").value = user.role || "USER";
    }

    // ✅ Submit form
    document.getElementById("userForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.getElementById("errorMsg").classList.add("hidden");

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword = document.getElementById("confirmPassword").value;
        const userRole = document.getElementById("userRole").value;

        // Validation
        if (!name || !email) {
            showError("Name and email are required.");
            return;
        }

        // Password validation
        if (password || confirmPassword) {
            if (password !== confirmPassword) {
                showError("Passwords do not match.");
                return;
            }
            if (password.length < 6) {
                showError("Password must be at least 6 characters.");
                return;
            }
        }

        if (!isEdit && !password) {
            showError("Password is required for new user.");
            return;
        }

        setLoading(true);

        // ✅ Build request body
        const userData = {
            name: name,
            email: email,
            role: userRole
        };

        // Only include password if provided
        if (password) {
            userData.password = password;
        }

        try {
            let res;

            if (isEdit) {
                res = await fetch(`${BASE_URL}/api/admin/users/${userId}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": "Bearer " + token,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });
            } else {
                res = await fetch(`${BASE_URL}/api/admin/users`, {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer " + token,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });
            }

            if (!res.ok) {
                const err = await res.json().catch(() => ({ error: "Request failed" }));
                showError(err.error || "Operation failed.");
                setLoading(false);
                return;
            }

            showSuccess(isEdit ? "User updated successfully!" : "User created successfully!");
            setLoading(false);

            setTimeout(() => {
                window.location.href = "admin-user.html";
            }, 1500);

        } catch (err) {
            showError("Connection error. Is the server running?");
            setLoading(false);
        }
    });

    function logout() { localStorage.clear(); window.location.href = "login.html"; }

    // Load if editing
    if (isEdit) loadUser();
</script>

</body>
</html>
