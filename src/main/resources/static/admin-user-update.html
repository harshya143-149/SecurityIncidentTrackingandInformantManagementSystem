<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add / Update User – Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 text-gray-900 min-h-screen flex items-center justify-center p-6">

<script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "ADMIN") {
        window.location.href = "login.html";
    }
</script>

<div class="bg-white border border-gray-200 p-8 rounded-2xl shadow-xl w-full max-w-md">

    <h1 id="formTitle" class="text-3xl font-bold mb-6 text-blue-600 text-center">Add New User</h1>

    <form id="userForm" class="flex flex-col gap-5">

        <div>
            <label class="block mb-1 font-medium">Full Name</label>
            <input id="fullName" type="text"
                   class="w-full bg-gray-100 border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500"
                   required>
        </div>

        <div>
            <label class="block mb-1 font-medium">Email</label>
            <input id="email" type="email"
                   class="w-full bg-gray-100 border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500"
                   required>
        </div>

        <div>
            <label class="block mb-1 font-medium">Password</label>
            <input id="password" type="password"
                   placeholder="Leave empty to keep current password"
                   class="w-full bg-gray-100 border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block mb-1 font-medium">User Role</label>
            <select id="userRole"
                    class="w-full bg-gray-100 border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500">
                <option value="USER">USER</option>
                <option value="OFFICER">OFFICER</option>
                <option value="ADMIN">ADMIN</option>
            </select>
        </div>

        <button type="submit"
                class="bg-blue-600 hover:bg-blue-700 text-white p-3 rounded-lg font-semibold transition">
            Submit
        </button>
    </form>

    <a href="admin-user.html"
       class="block mt-6 text-center text-blue-600 hover:underline">
        ← Back to Users
    </a>
</div>

<script>
    const params = new URLSearchParams(window.location.search);
    const userId = params.get("id");
    const formTitle = document.getElementById("formTitle");
    const userForm = document.getElementById("userForm");

    // Load user data if editing
    if (userId) {
        formTitle.textContent = "Update User";

        fetch(`http://localhost:8080/api/admin/users/${userId}`, {
            headers: { "Authorization": `Bearer ${token}` }
        })
        .then(res => res.json())
        .then(user => {
            document.getElementById("fullName").value = user.fullName;
            document.getElementById("email").value = user.email;
            document.getElementById("userRole").value = user.role;
        })
        .catch(() => alert("Failed to load user details."));
    }

    userForm.addEventListener("submit", async (e) => {
        e.preventDefault();

        const userData = {
            fullName: fullName.value,
            email: email.value,
            password: password.value,
            role: userRole.value
        };

        try {
            let response;

            if (userId) {
                response = await fetch(`http://localhost:8080/api/admin/users/${userId}`, {
                    method: "PUT",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });
            } else {
                response = await fetch("http://localhost:8080/api/admin/users", {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(userData)
                });
            }

            if (!response.ok) {
                const err = await response.json().catch(() => ({ message: "Unexpected error" }));
                return alert("Error: " + err.message);
            }

            alert(userId ? "User updated successfully!" : "User created successfully!");
            window.location.href = "admin-user.html";

        } catch (err) {
            alert("Connection error: " + err.message);
        }
    });
</script>

</body>
</html>
