<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Officer</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 text-gray-900 min-h-screen flex items-center justify-center">

<!-- AUTH CHECK -->
<script>
    const token = localStorage.getItem("token");
    const role = localStorage.getItem("role");

    if (!token || role !== "ADMIN") {
        window.location.href = "login.html";
    }
</script>

<!-- CARD CONTAINER -->
<div class="bg-white border border-gray-200 p-8 rounded-3xl shadow-2xl w-full max-w-lg">

    <h1 class="text-3xl font-bold mb-6 text-blue-600 text-center">Edit Officer</h1>

    <form id="editForm" class="space-y-5">

        <div>
            <label class="block text-gray-700 mb-1 font-medium">Full Name</label>
            <input id="name" type="text" required
                   class="w-full bg-gray-100 border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 mb-1 font-medium">Email</label>
            <input id="email" type="email" required
                   class="w-full bg-gray-100 border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500">
        </div>

        <div>
            <label class="block text-gray-700 mb-1 font-medium">Phone</label>
            <input id="phone" type="text" required
                   class="w-full bg-gray-100 border border-gray-300 p-3 rounded focus:ring-2 focus:ring-blue-500">
        </div>

        <button class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded-lg text-white font-semibold transition">
            Update Officer
        </button>
    </form>

    <a href="admin-officers.html"
       class="block mt-6 text-center text-blue-600 hover:underline">
        ← Back to Officers
    </a>

</div>

<!-- SCRIPT -->
<script>
    const params = new URLSearchParams(location.search);
    const id = params.get("id");

    async function loadOfficer() {
        try {
            const res = await fetch(`http://localhost:8080/api/admin/officers/${id}`, {
                headers: { "Authorization": "Bearer " + token }
            });

            if (!res.ok) {
                alert("Failed to load officer.");
                return;
            }

            const officer = await res.json();
            document.getElementById("name").value = officer.fullName || "";
            document.getElementById("email").value = officer.email || "";
            document.getElementById("phone").value = officer.phone || "";

        } catch (err) {
            alert("Error loading officer: " + err.message);
        }
    }

    loadOfficer();

    document.getElementById("editForm").addEventListener("submit", async (e) => {
        e.preventDefault();

        const data = {
            fullName: document.getElementById("name").value.trim(),
            email: document.getElementById("email").value.trim(),
            phone: document.getElementById("phone").value.trim()
        };

        try {
            const res = await fetch(`http://localhost:8080/api/admin/officers/${id}`, {
                method: "PUT",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            if (!res.ok) {
                const err = await res.text();
                alert("Update failed: " + err);
                return;
            }

            alert("Officer updated successfully!");
            window.location.href = "admin-officers.html";

        } catch (err) {
            alert("Error: " + err.message);
        }
    });
</script>

</body>
</html>
