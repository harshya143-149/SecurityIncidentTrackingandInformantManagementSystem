<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Tip | SITIMS</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex text-gray-900">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");

    if (!token) {

        window.location.href = "login.html";
    }

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<!-- SIDEBAR -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl min-h-screen">

    <div class="mb-6">

        <div class="flex items-center gap-3 mb-1">

            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

            <h2 class="text-xl font-extrabold">
                SITIMS
            </h2>

        </div>

        <p class="text-blue-300 text-xs ml-9">
            User Panel
        </p>

    </div>

    <nav class="space-y-1 flex-1">

        <a href="dashboard.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-speedometer2"></i>
            Dashboard

        </a>



        <a href="submit-tip.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-lightbulb"></i>
            Submit Tip

        </a>

        <!-- ACTIVE -->
        <a href="my-tips.html"
           class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">

            <i class="bi bi-lightbulb-fill"></i>
            My Tips

        </a>

        <a href="user-edit-profile.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-pencil-square"></i>
            Edit Profile

        </a>

    </nav>

    <button onclick="logout()"
            class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

        <i class="bi bi-box-arrow-left"></i>
        Logout

    </button>

</aside>

<!-- MAIN -->
<main class="flex-1 flex items-center justify-center p-8">

    <div class="max-w-3xl w-full">

        <!-- TITLE -->
        <div class="mb-6">

            <h1 class="text-3xl font-bold text-gray-800">
                Edit Tip
            </h1>

            <p class="text-gray-500 mt-1">
                Update your submitted intelligence information
            </p>

        </div>

        <!-- FORM CARD -->
        <div class="bg-white border border-gray-200 shadow-xl rounded-2xl p-8">

            <!-- HEADER -->
            <div class="flex items-center gap-4 mb-8">

                <div class="bg-blue-100 text-blue-600 p-4 rounded-2xl">

                    <i class="bi bi-pencil-square text-3xl"></i>

                </div>

                <div>

                    <h2 class="text-2xl font-bold text-gray-800">
                        Edit Intelligence Tip
                    </h2>

                    <p class="text-gray-500 text-sm mt-1">
                        Make sure the information is accurate
                    </p>

                </div>

            </div>

            <!-- FORM -->
            <div class="space-y-6">

                <!-- TITLE -->
                <div>

                    <label class="block font-semibold mb-2">
                        Tip Title
                    </label>

                    <div class="relative">

                        <i class="bi bi-type absolute left-4 top-4 text-gray-400"></i>

                        <input
                                id="title"
                                type="text"
                                placeholder="Enter tip title"
                                class="w-full border border-gray-300 rounded-xl p-3 pl-12 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                        >

                    </div>

                </div>

                <!-- DESCRIPTION -->
                <div>

                    <label class="block font-semibold mb-2">
                        Description
                    </label>

                    <div class="relative">

                        <i class="bi bi-card-text absolute left-4 top-4 text-gray-400"></i>

                        <textarea
                                id="description"
                                rows="5"
                                placeholder="Provide detailed information..."
                                class="w-full border border-gray-300 rounded-xl p-3 pl-12 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition resize-none"
                        ></textarea>

                    </div>

                </div>

                <!-- LOCATION -->
                <div>

                    <label class="block font-semibold mb-2">
                        Location
                    </label>

                    <div class="relative">

                        <i class="bi bi-geo-alt absolute left-4 top-4 text-gray-400"></i>

                        <input
                                id="location"
                                type="text"
                                placeholder="Enter location"
                                class="w-full border border-gray-300 rounded-xl p-3 pl-12 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                        >

                    </div>

                </div>

                <!-- CATEGORY + PRIORITY -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- CATEGORY -->
                    <div>

                        <label class="block font-semibold mb-2">
                            Category
                        </label>

                        <div class="relative">

                            <i class="bi bi-tags absolute left-4 top-4 text-gray-400"></i>

                            <input
                                    id="category"
                                    type="text"
                                    placeholder="Enter category"
                                    class="w-full border border-gray-300 rounded-xl p-3 pl-12 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                            >

                        </div>

                    </div>

                    <!-- PRIORITY -->
                    <div>

                        <label class="block font-semibold mb-2">
                            Priority Level
                        </label>

                        <select
                                id="priority"
                                class="w-full border border-gray-300 rounded-xl p-3 bg-gray-100 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">

                            <option value="LOW">LOW</option>
                            <option value="MEDIUM">MEDIUM</option>
                            <option value="HIGH">HIGH</option>

                        </select>

                    </div>

                </div>

                <!-- BUTTONS -->
                <div class="flex gap-4 pt-2">

                    <button onclick="updateTip()"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold transition shadow-md">

                        <i class="bi bi-check-circle mr-2"></i>
                        Update Tip

                    </button>

                    <a href="my-tips.html"
                       class="bg-gray-500 hover:bg-gray-600 text-white px-6 py-3 rounded-xl font-semibold transition">

                        <i class="bi bi-arrow-left mr-2"></i>
                        Cancel

                    </a>

                </div>

            </div>

        </div>

    </div>

</main>

<script>

    const params = new URLSearchParams(window.location.search);

    const tipId = params.get("tipId");

    async function loadTip() {

        try {

            const res = await fetch(`${BASE_URL}/tips/all`, {

                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const data = await res.json();

            const tip = data.find(t => t.id == tipId);

            if (!tip) {

                alert("Tip not found");

                window.location.href = "my-tips.html";

                return;
            }

            document.getElementById("title").value =
                tip.title || "";

            document.getElementById("description").value =
                tip.description || "";

            document.getElementById("location").value =
                tip.location || "";

            document.getElementById("category").value =
                tip.category || "";

            document.getElementById("priority").value =
                tip.priority || "MEDIUM";

        } catch (e) {

            alert("Error loading tip");
        }
    }

    async function updateTip() {

        const dto = {

            title: document.getElementById("title").value,

            description: document.getElementById("description").value,

            location: document.getElementById("location").value,

            category: document.getElementById("category").value,

            priority: document.getElementById("priority").value
        };

        try {

            const res = await fetch(`${BASE_URL}/tips/${tipId}`, {

                method: "PUT",

                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },

                body: JSON.stringify(dto)
            });

            if (res.ok) {

                alert("Updated successfully");

                window.location.href = "my-tips.html";

            } else {

                alert("Update failed");
            }

        } catch (e) {

            alert("Server error");
        }
    }

    loadTip();

</script>

</body>
</html>
