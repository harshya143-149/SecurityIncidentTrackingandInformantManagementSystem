<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 via-blue-700 to-blue-500 p-6">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-4">
            <i class="bi bi-shield-lock-fill text-blue-600 text-3xl"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-white tracking-wide">SITIMS</h1>
        <p class="text-blue-200 text-sm mt-1">Security Incident Tracking System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Welcome Back</h2>

        <!-- Error Message -->
        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span id="errorText">Invalid credentials</span>
        </div>

        <form id="loginForm" class="space-y-5">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <i class="bi bi-envelope absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="email" id="email" required
                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition"
                           placeholder="Enter your email">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <i class="bi bi-lock absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="password" id="password" required
                           class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl bg-gray-50
                                  focus:ring-2 focus:ring-blue-500 focus:border-blue-500 focus:outline-none transition"
                           placeholder="Enter your password">
                    <button type="button" onclick="togglePassword()"
                            class="absolute right-3 top-3.5 text-gray-400 hover:text-blue-500">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" id="loginBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl
                           font-semibold text-base transition shadow-md hover:shadow-lg
                           flex items-center justify-center gap-2">
                <span id="btnText">Login</span>
                <i class="bi bi-arrow-right-circle" id="btnIcon"></i>
            </button>
        </form>

        <p class="text-center mt-6 text-gray-500 text-sm">
            Don't have an account?
            <a href="register.html" class="text-blue-600 font-semibold hover:underline">Register here</a>
        </p>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8080";

    // ✅ Check if already logged in
    const existingToken = localStorage.getItem("token");
    const existingRole = localStorage.getItem("role");
    if (existingToken && existingRole) {
        redirectByRole(existingRole);
    }

    function togglePassword() {
        const pwd = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        if (pwd.type === "password") {
            pwd.type = "text";
            icon.className = "bi bi-eye-slash";
        } else {
            pwd.type = "password";
            icon.className = "bi bi-eye";
        }
    }

    function showError(msg) {
        document.getElementById("errorText").innerText = msg;
        document.getElementById("errorMsg").classList.remove("hidden");
    }

    function hideError() {
        document.getElementById("errorMsg").classList.add("hidden");
    }

    function setLoading(loading) {
        const btn = document.getElementById("loginBtn");
        const text = document.getElementById("btnText");
        const icon = document.getElementById("btnIcon");
        if (loading) {
            btn.disabled = true;
            text.innerText = "Logging in...";
            icon.className = "bi bi-arrow-repeat animate-spin";
        } else {
            btn.disabled = false;
            text.innerText = "Login";
            icon.className = "bi bi-arrow-right-circle";
        }
    }

    function redirectByRole(role) {
        switch (role.toUpperCase()) {
            case "ADMIN":    window.location.href = "admin-dashboard.html"; break;
            case "OFFICER":  window.location.href = "Officer-dashboard.html"; break;
            case "INFORMANT": window.location.href = "submit-tip.html"; break;
            default:         window.location.href = "dashboard.html"; break;
        }
    }

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        hideError();
        setLoading(true);

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;

        try {
            const res = await fetch(`${BASE_URL}/api/auth/login`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ email, password })
            });

            const result = await res.json();

            if (!res.ok) {
                showError(result.error || "Invalid email or password");
                setLoading(false);
                return;
            }

            // ✅ Store all user info
            localStorage.setItem("token", result.token);
            localStorage.setItem("role", (result.role || "").toUpperCase());
            localStorage.setItem("userId", result.id || "");
            localStorage.setItem("emailFromLogin", result.email || "");
            localStorage.setItem("name", result.fullName || "");

            redirectByRole(result.role);

        } catch (err) {
            console.error(err);
            showError("Connection error. Is the server running?");
            setLoading(false);
        }
    });
</script>
</body>
</html>
