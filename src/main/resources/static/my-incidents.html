<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Incidents</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>

    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");

    if (!token || !userId) {
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

</script>

<!-- Sidebar -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl min-h-screen">

    <div class="mb-6">
        <div class="flex items-center gap-3 mb-1">
            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
            <h2 class="text-xl font-extrabold">SITIMS</h2>
        </div>

        <p class="text-blue-400 text-xs ml-9">User Panel</p>
    </div>

    <nav class="space-y-1 flex-1">

        <a href="dashboard.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="create-incident.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-plus-circle"></i>
            Report Incident
        </a>

        <a href="my-incidents.html"
           class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">
            <i class="bi bi-file-earmark-text"></i>
            My Incidents
        </a>

        <a href="submit-tip.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-lightbulb"></i>
            Submit Tip
        </a>

        <a href="user-edit-profile.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-pencil-square"></i>
            Edit Profile
        </a>

    </nav>

    <button onclick="logout()"
            class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

        <i class="bi bi-box-arrow-left"></i>
        Logout

    </button>

</aside>

<!-- Main Content -->
<main class="flex-1 p-8 overflow-x-auto">

    <h1 class="text-4xl font-extrabold mb-8 text-blue-600 text-center">
        My Reported Incidents
    </h1>

    <div class="overflow-x-auto rounded-2xl shadow-lg border border-gray-200 bg-white">

        <table class="w-full table-auto text-left border-collapse">

            <thead class="bg-blue-100 text-blue-600 uppercase tracking-wide">

            <tr>
                <th class="p-4 border-b border-blue-200">ID</th>
                <th class="p-4 border-b border-blue-200">Title</th>
                <th class="p-4 border-b border-blue-200">Status</th>
                <th class="p-4 border-b border-blue-200">Officer Assigned</th>
                <th class="p-4 border-b border-blue-200">Severity</th>
                <th class="p-4 border-b border-blue-200">Created</th>
            </tr>

            </thead>

            <tbody id="incidentTable" class="divide-y divide-blue-200"></tbody>

        </table>

    </div>

</main>

<script>

    async function loadIncidents() {

        try {

            const res = await fetch(`http://localhost:8080/api/incidents/user/${userId}`, {

                headers: {
                    "Authorization": "Bearer " + token
                }

            });

            if (res.status === 401 || res.status === 403) {

                localStorage.clear();

                alert("Session expired! Please login again.");

                window.location.href = "login.html";

                return;
            }

            if (!res.ok) {

                alert("Failed to load incidents");

                return;
            }

            const incidents = await res.json();

            const table = document.getElementById("incidentTable");

            table.innerHTML = "";

            incidents.forEach(i => {

                let officerName = i.assignedOfficer?.fullName || "Not Assigned";

                const createdDate = new Date(i.createdAt).toLocaleString();

                table.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-all duration-150">
                        <td class="p-4 font-medium text-blue-600">${i.id}</td>
                        <td class="p-4 font-semibold text-blue-500">${i.title}</td>
                        <td class="p-4 capitalize text-gray-700">${i.status}</td>
                        <td class="p-4 text-gray-700">${officerName}</td>
                        <td class="p-4 font-semibold text-yellow-500">${i.severity}</td>
                        <td class="p-4 text-gray-500">${createdDate}</td>
                    </tr>
                `;

            });

        } catch (err) {

            console.error(err);

            alert("Error loading incidents!");

            window.location.href = "login.html";
        }
    }

    loadIncidents();

</script>

</body>
</html>
