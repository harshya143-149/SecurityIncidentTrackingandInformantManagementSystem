<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Incidents</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");

    function isTokenExpired(t) {
        try {
            const payload = JSON.parse(atob(t.split('.')[1]));
            return payload.exp * 1000 < Date.now();
        } catch {
            return true;
        }
    }

    if (!token || !userId || isTokenExpired(token)) {
        localStorage.clear();
        alert("Session expired. Please login again.");
        window.location.href = "login.html";
    }

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

</script>

<!-- Sidebar -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl min-h-screen">

    <div class="mb-6">
        <div class="flex items-center gap-3 mb-1">
            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
            <h2 class="text-xl font-extrabold">SITIMS</h2>
        </div>
        <p class="text-blue-400 text-xs ml-9">User Panel</p>
    </div>

    <nav class="space-y-1 flex-1">
        <a href="dashboard.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-speedometer2"></i>
            Dashboard
        </a>

        <a href="create-incident.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-plus-circle"></i>
            Report Incident
        </a>

        <a href="my-incidents.html" class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">
            <i class="bi bi-file-earmark-text"></i>
            My Incidents
        </a>

        <a href="user-edit-profile.html" class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-pencil-square"></i>
            Edit Profile
        </a>
    </nav>

    <button onclick="logout()"
            class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">
        <i class="bi bi-box-arrow-left"></i>
        Logout
    </button>

</aside>

<!-- Main Content -->
<main class="flex-1 p-8 overflow-x-auto">

    <div class="flex justify-between items-center mb-8">

        <div>
            <h1 class="text-4xl font-extrabold text-blue-600">
                My Reported Incidents
            </h1>
            <p class="text-gray-500 mt-1">
                View all incidents reported by you
            </p>
        </div>

        <button onclick="loadIncidents()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl shadow">
            <i class="bi bi-arrow-clockwise"></i>
            Refresh
        </button>

    </div>

    <div class="overflow-x-auto rounded-2xl shadow-lg border border-gray-200 bg-white">

        <table class="w-full table-auto text-left border-collapse">

            <thead class="bg-blue-100 text-blue-600 uppercase tracking-wide">
            <tr>
                <th class="p-4 border-b border-blue-200">ID</th>
                <th class="p-4 border-b border-blue-200">Title</th>
                <th class="p-4 border-b border-blue-200">Status</th>
                <th class="p-4 border-b border-blue-200">Officer Assigned</th>
                <th class="p-4 border-b border-blue-200">Severity</th>
                <th class="p-4 border-b border-blue-200">Created</th>
                <th class="p-4 border-b border-blue-200">Actions</th>
            </tr>
            </thead>

            <tbody id="incidentTable" class="divide-y divide-blue-200"></tbody>

        </table>

    </div>

</main>

<script>

    async function loadIncidents() {

        try {

            const res = await fetch(`${BASE_URL}/api/incidents/user/${userId}`, {
                method: "GET",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                }
            });

            const incidents = await res.json();

            const table = document.getElementById("incidentTable");
            table.innerHTML = "";

            if (incidents.length === 0) {
                table.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center p-10 text-gray-500">
                            No incidents found
                        </td>
                    </tr>`;
                return;
            }

            incidents.forEach(i => {

                let officerName = i.assignedOfficer?.fullName || "Not Assigned";

                let createdDate = i.createdAt
                    ? new Date(i.createdAt).toLocaleString()
                    : "-";

                table.innerHTML += `
                    <tr class="hover:bg-blue-50 transition-all duration-150">

                        <td class="p-4 font-medium text-blue-600">${i.id}</td>

                        <td class="p-4 font-semibold text-blue-500">${i.title}</td>

                        <td class="p-4 font-bold">${i.status}</td>

                        <td class="p-4 text-gray-700">${officerName}</td>

                        <td class="p-4 font-semibold text-orange-500">${i.severity}</td>

                        <td class="p-4 text-gray-500">${createdDate}</td>

                        <td class="p-4 flex gap-2">

                            <button onclick="updateIncident(${i.id})"
                                class="bg-yellow-500 hover:bg-yellow-600 text-white px-3 py-1 rounded-lg text-xs">
                                Update
                            </button>

                            <button onclick="deleteIncident(${i.id})"
                                class="bg-red-500 hover:bg-red-600 text-white px-3 py-1 rounded-lg text-xs">
                                Delete
                            </button>

                        </td>

                    </tr>
                `;
            });

        } catch (err) {
            console.error(err);
            alert("Error loading incidents!");
        }
    }

    function updateIncident(id) {
        window.location.href = `user-update-incidents.html?id=${id}`;
    }

    async function deleteIncident(id) {

        const confirmDelete = confirm("Are you sure you want to delete this incident?");
        if (!confirmDelete) return;

        try {

            const res = await fetch(`${BASE_URL}/api/incidents/delete/${id}`, {
                method: "DELETE",
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const msg = await res.text();

            if (!res.ok) {
                console.log("DELETE ERROR:", msg);
                alert("Delete failed: " + msg);
                return;
            }

            alert("Incident deleted successfully");
            loadIncidents();

        } catch (err) {
            console.error(err);
            alert("Network error");
        }
    }

    loadIncidents();

</script>

</body>
</html>
