<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tips | SITIMS</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>

    const BASE_URL = "http://localhost:8080";

    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");
    const userRole = localStorage.getItem("role");

    if (!token || !userId || isTokenExpired(token)) {

        localStorage.clear();

        window.location.href = "login.html";
    }

    if (userRole === "ADMIN") {

        window.location.href = "admin-dashboard.html";

    } else if (userRole === "OFFICER") {

        window.location.href = "Officer-dashboard.html";
    }

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<!-- SIDEBAR -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">

    <!-- Logo -->
    <div class="mb-8">

        <div class="flex items-center gap-3 mb-1">

            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

            <h2 class="text-2xl font-extrabold tracking-wide">
                SITIMS
            </h2>

        </div>

        <p class="text-blue-300 text-xs ml-9">
            User Panel
        </p>

    </div>

    <!-- Navigation -->
    <nav class="space-y-2 flex-1">

        <a href="informant-dashboard.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-speedometer2"></i>
            Dashboard

        </a>



        <a href="submit-tip.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-lightbulb"></i>
            Submit Tip

        </a>

        <!-- ACTIVE -->
        <a href="my-tips.html"
           class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">

            <i class="bi bi-lightbulb-fill"></i>
            My Tips

        </a>

        <a href="informant-edit-profile.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-pencil-square"></i>
            Edit Profile

        </a>

    </nav>

    <!-- Logout -->
    <button onclick="logout()"
            class="flex items-center justify-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

        <i class="bi bi-box-arrow-left"></i>
        Logout

    </button>

</aside>

<!-- MAIN -->
<main class="flex-1 p-8 overflow-y-auto">

    <!-- HEADER -->
    <div class="flex justify-between items-center mb-8">

        <div>

            <h1 class="text-3xl font-bold text-gray-800">
                My Intelligence Tips
            </h1>

            <p class="text-gray-500 mt-1 text-sm">
                View and manage your submitted intelligence reports
            </p>

        </div>

        <button onclick="loadTips()"
                class="bg-blue-600 hover:bg-blue-700 text-white px-5 py-3 rounded-xl font-semibold transition shadow">

            <i class="bi bi-arrow-clockwise mr-2"></i>
            Refresh

        </button>

    </div>

    <!-- STATS -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-5 mb-8">

        <!-- TOTAL -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">

            <div class="flex justify-between items-center">

                <div>

                    <p class="text-xs uppercase tracking-wide text-gray-400">
                        Total Tips
                    </p>

                    <h2 id="totalTips"
                        class="text-3xl font-bold text-blue-700 mt-2">
                        0
                    </h2>

                </div>

                <div class="bg-blue-100 p-4 rounded-xl">

                    <i class="bi bi-lightbulb-fill text-blue-700 text-2xl"></i>

                </div>

            </div>

        </div>

        <!-- PENDING -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">

            <div class="flex justify-between items-center">

                <div>

                    <p class="text-xs uppercase tracking-wide text-gray-400">
                        Pending
                    </p>

                    <h2 id="pendingTips"
                        class="text-3xl font-bold text-yellow-500 mt-2">
                        0
                    </h2>

                </div>

                <div class="bg-yellow-100 p-4 rounded-xl">

                    <i class="bi bi-hourglass-split text-yellow-600 text-2xl"></i>

                </div>

            </div>

        </div>

        <!-- APPROVED -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">

            <div class="flex justify-between items-center">

                <div>

                    <p class="text-xs uppercase tracking-wide text-gray-400">
                        Approved
                    </p>

                    <h2 id="approvedTips"
                        class="text-3xl font-bold text-green-600 mt-2">
                        0
                    </h2>

                </div>

                <div class="bg-green-100 p-4 rounded-xl">

                    <i class="bi bi-check-circle-fill text-green-700 text-2xl"></i>

                </div>

            </div>

        </div>

        <!-- IGNORED -->
        <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">

            <div class="flex justify-between items-center">

                <div>

                    <p class="text-xs uppercase tracking-wide text-gray-400">
                        Ignored
                    </p>

                    <h2 id="ignoredTips"
                        class="text-3xl font-bold text-red-600 mt-2">
                        0
                    </h2>

                </div>

                <div class="bg-red-100 p-4 rounded-xl">

                    <i class="bi bi-x-circle-fill text-red-700 text-2xl"></i>

                </div>

            </div>

        </div>

    </div>

    <!-- LOADING -->
    <div id="loading"
         class="bg-white rounded-2xl border border-gray-200 p-8 text-center text-gray-500 shadow-sm">

        <i class="bi bi-arrow-repeat animate-spin text-3xl text-blue-600"></i>

        <p class="mt-3">
            Loading tips...
        </p>

    </div>

    <!-- EMPTY -->
    <div id="empty"
         class="hidden bg-white rounded-2xl border border-gray-200 p-10 text-center shadow-sm">

        <i class="bi bi-lightbulb text-5xl text-blue-600"></i>

        <h2 class="text-2xl font-bold mt-4 text-gray-800">
            No Tips Found
        </h2>

        <p class="text-gray-500 mt-2">
            You haven’t submitted any tips yet.
        </p>

    </div>

    <!-- GRID -->
    <div id="grid"
         class="hidden grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-5">

    </div>

</main>

<script>

    async function loadTips() {

        document.getElementById("loading").classList.remove("hidden");

        document.getElementById("grid").classList.add("hidden");

        document.getElementById("empty").classList.add("hidden");

        try {

            const res = await fetch(`${BASE_URL}/tips/my?userId=${userId}`, {

                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (!res.ok) {

                throw new Error("Failed");
            }

            const tips = await res.json();

            document.getElementById("loading").classList.add("hidden");

            render(tips);

        } catch (e) {

            console.error(e);

            document.getElementById("loading").innerHTML = `

                <div class="text-red-600">

                    <i class="bi bi-exclamation-circle text-4xl"></i>

                    <p class="mt-3 font-medium">
                        Failed to load tips
                    </p>

                </div>
            `;
        }
    }

    function getStatusColor(status) {

        if (status === "PENDING")
            return "bg-yellow-500 text-white";

        if (status === "APPROVED")
            return "bg-green-600 text-white";

        if (status === "IGNORED")
            return "bg-red-600 text-white";

        return "bg-gray-500 text-white";
    }

    function render(tips) {

        const grid = document.getElementById("grid");

        // STATS
        document.getElementById("totalTips").innerText =
            tips.length;

        document.getElementById("pendingTips").innerText =
            tips.filter(t => t.status === "PENDING").length;

        document.getElementById("approvedTips").innerText =
            tips.filter(t => t.status === "APPROVED").length;

        document.getElementById("ignoredTips").innerText =
            tips.filter(t => t.status === "IGNORED").length;

        if (!tips.length) {

            document.getElementById("empty").classList.remove("hidden");

            grid.classList.add("hidden");

            return;
        }

        grid.classList.remove("hidden");

        grid.innerHTML = tips.map(t => `

        <div class="bg-white rounded-2xl border border-gray-200 shadow-sm hover:shadow-xl transition overflow-hidden">

            <!-- TOP -->
            <div class="bg-gradient-to-r from-blue-700 to-blue-900 p-5 text-white">

                <div class="flex justify-between items-start gap-3">

                    <div>

                        <h2 class="text-xl font-bold">
                            ${t.title}
                        </h2>

                        <p class="text-blue-100 text-xs mt-1">
                            Intelligence Tip
                        </p>

                    </div>

                    <span class="px-3 py-1 rounded-full text-xs font-semibold ${getStatusColor(t.status)}">

                        ${t.status}

                    </span>

                </div>

            </div>

            <!-- BODY -->
            <div class="p-5">

                <div class="mb-4">

                    <p class="text-xs uppercase text-gray-400 font-semibold mb-2">
                        Description
                    </p>

                    <p class="text-sm text-gray-700 leading-relaxed min-h-[80px]">

                        ${t.description || "No description"}

                    </p>

                </div>

                <div class="space-y-3">

                    <div class="flex items-center gap-2 text-sm text-gray-500 bg-gray-50 p-3 rounded-xl border border-gray-100">

                        <i class="bi bi-geo-alt-fill text-blue-600"></i>

                        <span>
                            ${t.location || "No location available"}
                        </span>

                    </div>

                    <div class="grid grid-cols-2 gap-3">

                        <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">

                            <p class="text-xs text-gray-400 uppercase mb-1">
                                Category
                            </p>

                            <p class="text-sm font-semibold text-gray-700">
                                ${t.category || "N/A"}
                            </p>

                        </div>

                        <div class="bg-gray-50 border border-gray-100 rounded-xl p-3">

                            <p class="text-xs text-gray-400 uppercase mb-1">
                                Priority
                            </p>

                            <p class="text-sm font-semibold text-gray-700">
                                ${t.priority || "N/A"}
                            </p>

                        </div>

                    </div>

                </div>

                <!-- ACTIONS -->
                <div class="flex gap-3 mt-5">

                    <button onclick="editTip(${t.id})"
                            class="flex-1 bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-semibold transition">

                        <i class="bi bi-pencil-square mr-1"></i>
                        Edit

                    </button>

                    <button onclick="deleteTip(${t.id})"
                            class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3 rounded-xl font-semibold transition">

                        <i class="bi bi-trash-fill mr-1"></i>
                        Delete

                    </button>

                </div>

            </div>

        </div>

        `).join("");
    }

    function editTip(id) {

        window.location.href = `edit-tip.html?tipId=${id}`;
    }

    async function deleteTip(id) {

        if (!confirm("Delete this tip?"))
            return;

        try {

            const res = await fetch(`${BASE_URL}/tips/${id}`, {

                method: "DELETE",

                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            if (res.ok) {

                alert("Tip deleted successfully");

                await loadTips();

            } else {

                const text = await res.text();

                alert("Delete failed : " + text);
            }

        } catch (e) {

            alert("Server error while deleting");
        }
    }

    loadTips();

</script>

</body>
</html>
