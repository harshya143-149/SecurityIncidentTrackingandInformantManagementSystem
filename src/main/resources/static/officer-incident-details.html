<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Incident Details</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 min-h-screen p-6 text-gray-900">

<script>

    const token = localStorage.getItem("token");
    const officerName = localStorage.getItem("name") || "Officer";

    if (!token) {

        alert("Please login first!");

        window.location.href = "login.html";
    }

</script>

<div class="max-w-5xl mx-auto bg-white rounded-3xl shadow-2xl p-8">

    <h2 class="text-3xl font-bold mb-8 text-blue-600 text-center">
        Incident Details
    </h2>

    <!-- Incident Details -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
            <p class="text-sm text-gray-500 mb-1">Incident ID</p>
            <p id="incidentId" class="font-bold text-lg text-blue-700">Loading...</p>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
            <p class="text-sm text-gray-500 mb-1">Title</p>
            <p id="incidentTitle" class="font-semibold text-gray-800">Loading...</p>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100 md:col-span-2">
            <p class="text-sm text-gray-500 mb-1">Description</p>
            <p id="incidentDescription" class="text-gray-700">Loading...</p>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
            <p class="text-sm text-gray-500 mb-1">Status</p>

            <span id="incidentStatus"
                  class="px-3 py-1 rounded-full text-sm font-semibold">
                Loading...
            </span>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
            <p class="text-sm text-gray-500 mb-1">Severity</p>

            <span id="incidentSeverity"
                  class="px-3 py-1 rounded-full text-sm font-semibold bg-yellow-200 text-yellow-800">
                Loading...
            </span>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
            <p class="text-sm text-gray-500 mb-1">Location</p>
            <p id="incidentLocation" class="text-gray-700">Loading...</p>
        </div>

        <div class="bg-blue-50 p-5 rounded-2xl border border-blue-100">
            <p class="text-sm text-gray-500 mb-1">Assigned Officer</p>
            <p id="assignedOfficer" class="text-gray-700">Loading...</p>
        </div>

    </div>

    <!-- Officer Remark -->
    <div class="mb-10">

        <h3 class="text-2xl font-bold text-blue-600 mb-4">
            Officer Remark
        </h3>

        <div id="officerRemark"
             class="bg-gray-100 border border-gray-200 rounded-2xl p-5 text-gray-700">
            Loading officer remark...
        </div>

    </div>

    <!-- All Remarks -->
    <div>

        <h3 class="text-2xl font-bold text-blue-600 mb-4">
            All Remarks
        </h3>

        <div id="remarkList" class="space-y-4">
            <p class="text-gray-500">Loading remarks...</p>
        </div>

    </div>

    <!-- Back Button -->
    <div class="mt-10 text-center">

        <button
                onclick="window.location.href='Officer-dashboard.html'"
                class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-xl font-semibold shadow-md hover:shadow-lg transition">

            ← Back to Assigned Incidents

        </button>

    </div>

</div>

<script>

    const params = new URLSearchParams(window.location.search);

    const id = params.get("id");

    async function loadDetails() {

        try {

            const res = await fetch(`http://localhost:8080/api/incidents/${id}`, {

                headers: {
                    "Authorization": "Bearer " + token
                }

            });

            if (!res.ok) {

                alert("Failed to load incident details.");

                return;
            }

            const inc = await res.json();

            const assignedOfficer =
                inc.assignedOfficer?.name || officerName;

            document.getElementById("incidentId").innerText =
                inc.id || "N/A";

            document.getElementById("incidentTitle").innerText =
                inc.title || "N/A";

            document.getElementById("incidentDescription").innerText =
                inc.description || "N/A";

            document.getElementById("incidentLocation").innerText =
                inc.location || inc.tipLocation || "N/A";

            document.getElementById("assignedOfficer").innerText =
                assignedOfficer;

            document.getElementById("incidentSeverity").innerText =
                inc.severity || inc.priority || "N/A";

            const statusElement =
                document.getElementById("incidentStatus");

            statusElement.innerText = inc.status || "N/A";

            statusElement.className =
                `px-3 py-1 rounded-full text-sm font-semibold ${getStatusColor(inc.status)}`;

            document.getElementById("officerRemark").innerHTML =
                inc.officerRemark
                    ? inc.officerRemark
                    : `<span class="text-gray-500">No officer remark yet.</span>`;

        } catch (err) {

            console.error(err);

            alert("Error loading incident details.");
        }
    }

    function getStatusColor(status) {

        return {
            'NEW': 'bg-yellow-200 text-yellow-800',
            'IN_PROGRESS': 'bg-blue-200 text-blue-800',
            'ASSIGNED': 'bg-indigo-200 text-indigo-800',
            'RESOLVED': 'bg-green-200 text-green-800',
            'CLOSED': 'bg-gray-300 text-gray-800'
        }[status] || 'bg-gray-200 text-gray-800';
    }

    async function loadRemarks() {

        try {

            const res = await fetch(`http://localhost:8080/api/remarks/incident/${id}`, {

                headers: {
                    "Authorization": "Bearer " + token
                }

            });

            const remarks = await res.json();

            const remarkList =
                document.getElementById("remarkList");

            if (!remarks.length) {

                remarkList.innerHTML = `
                    <p class="text-gray-500">
                        No remarks yet.
                    </p>
                `;

                return;
            }

            remarkList.innerHTML = remarks.map(r => `

                <div class="bg-gray-100 border border-gray-200 rounded-2xl p-5">

                    <div class="flex justify-between items-center mb-2">

                        <h4 class="font-bold text-blue-600">
                            ${r.officerName || "Unknown Officer"}
                        </h4>

                        <span class="text-sm text-gray-500">
                            ${r.createdAt || ""}
                        </span>

                    </div>

                    <p class="text-gray-700">
                        ${r.text}
                    </p>

                </div>

            `).join("");

        } catch (e) {

            console.error(e);

            document.getElementById("remarkList").innerHTML = `
                <p class="text-red-500">
                    Failed to load remarks.
                </p>
            `;
        }
    }

    loadDetails();

    loadRemarks();

</script>

</body>
</html>
