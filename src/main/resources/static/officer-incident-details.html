<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Incident Details</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");

    const role = localStorage.getItem("role");

    const officerName =
        localStorage.getItem("name") || "Officer";

    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    if (!token || isTokenExpired(token)) {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<div class="flex min-h-screen">

    <!-- Sidebar -->
    <aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">

        <div class="mb-6">

            <div class="flex items-center gap-3 mb-1">

                <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

                <h2 class="text-xl font-extrabold">SITIMS</h2>

            </div>

            <p class="text-blue-400 text-xs ml-9">
                Officer Panel
            </p>

        </div>

        <nav class="space-y-1 flex-1">

            <a href="Officer-dashboard.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-speedometer2"></i>
                Dashboard

            </a>



            <a href="Officer-edit-profile.html"
               class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

                <i class="bi bi-person-gear"></i>
                Edit Profile

            </a>

        </nav>

        <button onclick="logout()"
                class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">

            <i class="bi bi-box-arrow-left"></i>
            Logout

        </button>

    </aside>

    <!-- Main -->
    <main class="flex-1 p-8 overflow-y-auto">

        <!-- Top Bar -->
        <div class="flex justify-between items-center mb-6">

            <button onclick="history.back()"
                    class="flex items-center gap-2 text-blue-600 hover:text-blue-800 font-semibold transition">

                <i class="bi bi-arrow-left"></i>

                Back

            </button>

            <button onclick="viewHistory()"
                    class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded-xl shadow transition">

                <i class="bi bi-clock-history"></i>

                History

            </button>

        </div>

        <!-- Incident Card -->
        <div class="bg-white rounded-3xl shadow-md border border-gray-100 p-8 mb-6">

            <div class="flex justify-between items-start mb-6">

                <div>

                    <h1 class="text-3xl font-bold text-gray-800 flex items-center gap-2">

                        <i class="bi bi-exclamation-triangle-fill text-orange-500"></i>

                        Incident Details

                    </h1>

                    <p class="text-gray-500 text-sm mt-1">
                        Detailed incident information
                    </p>

                </div>

                <span id="statusBadge"
                      class="px-4 py-2 rounded-full text-sm font-semibold bg-gray-100 text-gray-600">

                    Loading...

                </span>

            </div>

            <!-- Loading -->
            <div id="detailsLoading"
                 class="text-center py-16 text-gray-400">

                <i class="bi bi-arrow-repeat animate-spin text-4xl block mb-3"></i>

                <p>Loading incident details...</p>

            </div>

            <!-- Details -->
            <div id="detailsGrid"
                 class="hidden grid grid-cols-1 md:grid-cols-2 gap-5"></div>

        </div>

        <!-- Officer Remark -->
        <div class="bg-white rounded-3xl shadow-md border border-gray-100 p-6 mb-6">

            <h3 class="text-xl font-bold text-blue-600 mb-4 flex items-center gap-2">

                <i class="bi bi-chat-left-quote-fill"></i>

                Officer Remark

            </h3>

            <div id="officerRemark">

                <p class="text-gray-400">
                    Loading remark...
                </p>

            </div>

        </div>

        <!-- All Remarks -->
        <div class="bg-white rounded-3xl shadow-md border border-gray-100 p-6">

            <div class="flex justify-between items-center mb-5">

                <h3 class="text-xl font-bold text-green-600 flex items-center gap-2">

                    <i class="bi bi-chat-dots-fill"></i>

                    All Remarks

                </h3>

                <span id="remarkCount"
                      class="bg-gray-100 text-gray-600 text-xs px-3 py-1 rounded-full font-semibold">

                    0 remarks

                </span>

            </div>

            <div id="remarkList" class="space-y-4">

                <p class="text-gray-400 text-center py-6">
                    Loading remarks...
                </p>

            </div>

        </div>

    </main>

</div>

<script>

    const params =
        new URLSearchParams(window.location.search);

    const id = params.get("id");

    const statusColors = {

        PENDING: "bg-yellow-100 text-yellow-700",

        IN_PROGRESS: "bg-blue-100 text-blue-700",

        ASSIGNED: "bg-indigo-100 text-indigo-700",

        RESOLVED: "bg-green-100 text-green-700",

        CLOSED: "bg-gray-200 text-gray-700"
    };

    const severityColors = {

        LOW: "bg-green-100 text-green-700",

        MEDIUM: "bg-yellow-100 text-yellow-700",

        HIGH: "bg-orange-100 text-orange-700",

        CRITICAL: "bg-red-100 text-red-700"
    };

    // ==========================
    // LOAD INCIDENT DETAILS
    // ==========================
    async function loadDetails() {

        try {

            const res = await fetch(

                `${BASE_URL}/api/incidents/${id}`,

                {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            if (!res.ok) {

                throw new Error();
            }

            const inc = await res.json();

            document.getElementById("detailsLoading")
                .classList.add("hidden");

            const grid =
                document.getElementById("detailsGrid");

            grid.classList.remove("hidden");

            // STATUS BADGE
            const statusBadge =
                document.getElementById("statusBadge");

            statusBadge.innerText =
                inc.status || "N/A";

            statusBadge.className =
                `px-4 py-2 rounded-full text-sm font-semibold ${
                    statusColors[inc.status]
                    || "bg-gray-100 text-gray-700"
                }`;

            // SEVERITY BADGE
            const severity =
                severityColors[inc.severity]
                || "bg-gray-100 text-gray-700";

            // ASSIGNED OFFICER
            const assignedOfficer =
                inc.assignedOfficer?.fullName
                || inc.assignedOfficer?.name
                || officerName;

            grid.innerHTML = `

                ${detailCard(
                    "Incident ID",
                    "#" + (inc.id || "N/A"),
                    "bi-hash"
                )}

                ${detailCard(
                    "Title",
                    inc.title || "N/A",
                    "bi-file-text"
                )}

                ${detailCard(
                    "Location",
                    inc.location || inc.tipLocation || "N/A",
                    "bi-geo-alt-fill"
                )}

                ${detailCard(
                    "Reported By",
                    inc.reportedBy || "N/A",
                    "bi-person-fill"
                )}

                ${detailCard(
                    "Assigned Officer",
                    assignedOfficer,
                    "bi-person-badge-fill"
                )}

                ${detailCard(
                    "Created At",
                    inc.createdAt
                        ? new Date(inc.createdAt)
                            .toLocaleString("en-IN")
                        : "N/A",
                    "bi-calendar3"
                )}

                <div class="bg-gray-50 rounded-2xl border border-gray-200 p-5">

                    <p class="text-xs text-gray-400 uppercase font-semibold mb-2">

                        Severity

                    </p>

                    <span class="px-3 py-1 rounded-full text-sm font-semibold ${severity}">

                        ${inc.severity || "N/A"}

                    </span>

                </div>

                <div class="bg-gray-50 rounded-2xl border border-gray-200 p-5 md:col-span-2">

                    <p class="text-xs text-gray-400 uppercase font-semibold mb-2">

                        Description

                    </p>

                    <p class="text-gray-700 leading-relaxed text-sm">

                        ${inc.description || "No description available."}

                    </p>

                </div>
            `;

            // OFFICER REMARK
            document.getElementById("officerRemark").innerHTML =

                inc.officerRemark

                    ? `
                        <div class="bg-blue-50 border border-blue-200 rounded-2xl p-5 text-blue-800 text-sm">
                            ${inc.officerRemark}
                        </div>
                      `

                    : `
                        <p class="text-gray-400 italic text-sm">
                            No officer remark available.
                        </p>
                      `;

        } catch (err) {

            document.getElementById("detailsLoading")
                .innerHTML = `

                <div class="text-red-400">

                    <i class="bi bi-x-circle text-4xl block mb-2"></i>

                    Failed to load incident details.

                </div>
            `;
        }
    }

    function detailCard(label, value, icon) {

        return `

            <div class="bg-gray-50 rounded-2xl border border-gray-200 p-5">

                <p class="text-xs text-gray-400 uppercase font-semibold mb-2 flex items-center gap-1">

                    <i class="bi ${icon}"></i>

                    ${label}

                </p>

                <p class="text-gray-800 text-sm font-medium break-words">

                    ${value}

                </p>

            </div>
        `;
    }

    // ==========================
    // LOAD REMARKS
    // ==========================
    async function loadRemarks() {

        try {

            const res = await fetch(

                `${BASE_URL}/api/remarks/incident/${id}`,

                {
                    headers: {
                        "Authorization": "Bearer " + token
                    }
                }
            );

            const remarks = await res.json();

            document.getElementById("remarkCount")
                .innerText = `${remarks.length} remarks`;

            if (!remarks.length) {

                document.getElementById("remarkList")
                    .innerHTML = `

                    <p class="text-gray-400 text-center italic py-5">

                        No remarks available.

                    </p>
                `;

                return;
            }

            document.getElementById("remarkList").innerHTML =

                remarks.map(r => `

                    <div class="bg-gray-50 border border-gray-200 rounded-2xl p-5">

                        <div class="flex justify-between items-start gap-3 mb-2">

                            <div>

                                <p class="text-blue-600 font-semibold text-sm flex items-center gap-1">

                                    <i class="bi bi-person-circle"></i>

                                    ${r.officerName || "Unknown Officer"}

                                </p>

                            </div>

                            <p class="text-xs text-gray-400">

                                ${r.createdAt
                                    ? new Date(r.createdAt)
                                        .toLocaleString("en-IN")
                                    : ""}

                            </p>

                        </div>

                        <p class="text-gray-700 text-sm leading-relaxed">

                            ${r.text || ""}

                        </p>

                    </div>
                `).join("");

        } catch (err) {

            document.getElementById("remarkList")
                .innerHTML = `

                <p class="text-red-400 text-center">

                    Failed to load remarks.

                </p>
            `;
        }
    }

    // ==========================
    // VIEW HISTORY
    // ==========================
    function viewHistory() {

        window.location.href =
            `incident-history.html?id=${id}`;
    }

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

    if (id) {

        loadDetails();

        loadRemarks();

    } else {

        document.getElementById("detailsLoading")
            .innerHTML = `

            <p class="text-red-400 text-center">

                Invalid incident ID.

            </p>
        `;
    }

</script>

</body>
</html>
