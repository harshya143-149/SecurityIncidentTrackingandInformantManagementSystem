<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-blue-50 min-h-screen flex items-center justify-center p-6">

<div class="max-w-md w-full bg-white shadow-lg rounded-3xl p-8">
    <h2 class="text-3xl font-bold text-center mb-8 text-teal-600">Register</h2>

    <form id="registerForm" class="space-y-6">

        <div>
            <label class="block font-semibold mb-1 text-gray-700">Username</label>
            <input type="text" id="username" required
                   class="w-full border border-gray-300 rounded-lg p-3 bg-white text-gray-900 placeholder-gray-400
                          focus:ring-2 focus:ring-teal-400 focus:outline-none transition duration-200"
                   placeholder="Enter username" />
        </div>

        <div>
            <label class="block font-semibold mb-1 text-gray-700">Full Name</label>
            <input type="text" id="fullName" required
                   class="w-full border border-gray-300 rounded-lg p-3 bg-white text-gray-900 placeholder-gray-400
                          focus:ring-2 focus:ring-teal-400 focus:outline-none transition duration-200"
                   placeholder="Enter full name" />
        </div>

        <div>
            <label class="block font-semibold mb-1 text-gray-700">Email</label>
            <input type="email" id="email" required
                   class="w-full border border-gray-300 rounded-lg p-3 bg-white text-gray-900 placeholder-gray-400
                          focus:ring-2 focus:ring-teal-400 focus:outline-none transition duration-200"
                   placeholder="Enter email" />
        </div>

        <div>
            <label class="block font-semibold mb-1 text-gray-700">Password</label>
            <input type="password" id="password" required
                   class="w-full border border-gray-300 rounded-lg p-3 bg-white text-gray-900 placeholder-gray-400
                          focus:ring-2 focus:ring-teal-400 focus:outline-none transition duration-200"
                   placeholder="Enter password" />
        </div>

        <div>
            <label class="block font-semibold mb-1 text-gray-700">Role</label>
            <select id="role" required
                    class="w-full border border-gray-300 rounded-lg p-3 bg-white text-gray-900
                           focus:ring-2 focus:ring-teal-400 focus:outline-none transition duration-200">
                <option value="">Select Role</option>
                <option value="USER">User</option>
                <option value="INFORMANT">Informant</option>
            </select>
        </div>

        <button type="submit"
                class="w-full bg-teal-500 text-white py-3 rounded-lg font-semibold text-lg
                       hover:bg-teal-600 transition duration-200 shadow-md hover:shadow-lg">
            Register
        </button>
    </form>
    <p class="text-center mt-4 text-gray-600">
        Already have an account?
        <a href="login.html" class="text-teal-600 hover:underline">Login here</a>
    </p>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const dto = {
            username: document.getElementById('username').value.trim(),
            fullName: document.getElementById('fullName').value.trim(),
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value.trim(),
            role: document.getElementById('role').value
        };

        if (!dto.role) {
            alert("Please select a role!");
            return;
        }

        try {
            const res = await fetch("http://localhost:8080/api/auth/register", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dto)
            });

            if (!res.ok) {
                const error = await res.text();
                alert("Registration Failed: " + error);
                return;
            }

            const result = await res.json();
            alert(result.message || "Registration Successful!");
            window.location.href = "login.html";

        } catch (err) {
            console.error(err);
            alert("An error occurred during registration");
        }
    });
</script>

</body>
</html>
