<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Register</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-900 via-blue-700 to-blue-500 p-6">

<div class="w-full max-w-md">

    <!-- Logo -->
    <div class="text-center mb-8">
        <div class="inline-flex items-center justify-center w-16 h-16 bg-white rounded-2xl shadow-lg mb-4">
            <i class="bi bi-shield-lock-fill text-blue-600 text-3xl"></i>
        </div>
        <h1 class="text-3xl font-extrabold text-white tracking-wide">SITIMS</h1>
        <p class="text-blue-200 text-sm mt-1">Security Incident Tracking System</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-3xl shadow-2xl p-8">
        <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Create Account</h2>

        <!-- Error Message -->
        <div id="errorMsg" class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
            <i class="bi bi-exclamation-circle-fill"></i>
            <span id="errorText"></span>
        </div>

        <!-- Success Message -->
        <div id="successMsg" class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-5 text-sm flex items-center gap-2">
            <i class="bi bi-check-circle-fill"></i>
            <span id="successText"></span>
        </div>

        <form id="registerForm" class="space-y-4">

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Username</label>
                <div class="relative">
                    <i class="bi bi-at absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="text" id="username" required
                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50
                                  focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                           placeholder="Enter username">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Full Name</label>
                <div class="relative">
                    <i class="bi bi-person absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="text" id="fullName" required
                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50
                                  focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                           placeholder="Enter full name">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email Address</label>
                <div class="relative">
                    <i class="bi bi-envelope absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="email" id="email" required
                           class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50
                                  focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                           placeholder="Enter email">
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                <div class="relative">
                    <i class="bi bi-lock absolute left-3 top-3.5 text-gray-400"></i>
                    <input type="password" id="password" required
                           class="w-full pl-10 pr-10 py-3 border border-gray-300 rounded-xl bg-gray-50
                                  focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                           placeholder="Enter password">
                    <button type="button" onclick="togglePassword()"
                            class="absolute right-3 top-3.5 text-gray-400 hover:text-blue-500">
                        <i class="bi bi-eye" id="eyeIcon"></i>
                    </button>
                </div>
            </div>

            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Register As</label>
                <div class="relative">
                    <i class="bi bi-person-badge absolute left-3 top-3.5 text-gray-400"></i>
                    <select id="role" required
                            class="w-full pl-10 pr-4 py-3 border border-gray-300 rounded-xl bg-gray-50
                                   focus:ring-2 focus:ring-blue-500 focus:outline-none transition appearance-none">
                        <option value="">-- Select Role --</option>
                        <option value="USER">User</option>
                        <option value="INFORMANT">Informant</option>
                    </select>
                </div>
            </div>

            <button type="submit" id="registerBtn"
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl
                           font-semibold text-base transition shadow-md hover:shadow-lg
                           flex items-center justify-center gap-2 mt-2">
                <span id="btnText">Register</span>
                <i class="bi bi-person-plus" id="btnIcon"></i>
            </button>

        </form>

        <p class="text-center mt-6 text-gray-500 text-sm">
            Already have an account?
            <a href="login.html" class="text-blue-600 font-semibold hover:underline">Login here</a>
        </p>
    </div>
</div>

<script>
    const BASE_URL = "http://localhost:8080";

    function togglePassword() {
        const pwd = document.getElementById("password");
        const icon = document.getElementById("eyeIcon");
        if (pwd.type === "password") {
            pwd.type = "text";
            icon.className = "bi bi-eye-slash";
        } else {
            pwd.type = "password";
            icon.className = "bi bi-eye";
        }
    }

    function showError(msg) {
        document.getElementById("errorText").innerText = msg;
        document.getElementById("errorMsg").classList.remove("hidden");
        document.getElementById("successMsg").classList.add("hidden");
    }

    function showSuccess(msg) {
        document.getElementById("successText").innerText = msg;
        document.getElementById("successMsg").classList.remove("hidden");
        document.getElementById("errorMsg").classList.add("hidden");
    }

    function setLoading(loading) {
        const btn = document.getElementById("registerBtn");
        const text = document.getElementById("btnText");
        const icon = document.getElementById("btnIcon");
        if (loading) {
            btn.disabled = true;
            text.innerText = "Registering...";
            icon.className = "bi bi-arrow-repeat animate-spin";
        } else {
            btn.disabled = false;
            text.innerText = "Register";
            icon.className = "bi bi-person-plus";
        }
    }

    document.getElementById("registerForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        document.getElementById("errorMsg").classList.add("hidden");
        document.getElementById("successMsg").classList.add("hidden");

        const username = document.getElementById("username").value.trim();
        const fullName = document.getElementById("fullName").value.trim();
        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const role = document.getElementById("role").value;

        // ✅ Validation
        if (!username || !fullName || !email || !password || !role) {
            showError("All fields are required.");
            return;
        }

        if (password.length < 6) {
            showError("Password must be at least 6 characters.");
            return;
        }

        if (!role) {
            showError("Please select a role.");
            return;
        }

        setLoading(true);

        const dto = { username, fullName, email, password, role };

        try {
            const res = await fetch(`${BASE_URL}/api/auth/register`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(dto)
            });

            const result = await res.json();

            if (!res.ok) {
                showError(result.message || "Registration failed. Try again.");
                setLoading(false);
                return;
            }

            // ✅ Success
            showSuccess(result.message || "Registration successful! Redirecting to login...");
            setLoading(false);

            // ✅ Redirect to login after 2 seconds
            setTimeout(() => {
                window.location.href = "login.html";
            }, 2000);

        } catch (err) {
            console.error(err);
            showError("Connection error. Is the server running?");
            setLoading(false);
        }
    });
</script>
</body>
</html>
