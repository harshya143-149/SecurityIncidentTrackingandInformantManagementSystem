<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Submit Tip | SITIMS</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
          rel="stylesheet">
</head>

<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>

    const BASE_URL = "http://localhost:8080";

    function isTokenExpired(t) {

        try {

            const p = JSON.parse(atob(t.split('.')[1]));

            return p.exp * 1000 < Date.now();

        } catch {

            return true;
        }
    }

    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");
    const userRole = localStorage.getItem("role");

    if (!token || !userId || isTokenExpired(token)) {

        localStorage.clear();

        window.location.href = "login.html";
    }

    if (userRole === "ADMIN") {

        window.location.href = "admin-dashboard.html";

    } else if (userRole === "OFFICER") {

        window.location.href = "Officer-dashboard.html";
    }

    function logout() {

        localStorage.clear();

        window.location.href = "login.html";
    }

</script>

<!-- SIDEBAR -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl min-h-screen">

    <!-- LOGO -->
    <div class="mb-8">

        <div class="flex items-center gap-3 mb-1">

            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>

            <h2 class="text-2xl font-extrabold tracking-wide">
                SITIMS
            </h2>

        </div>

        <p class="text-blue-300 text-xs ml-9">
            User Panel
        </p>

    </div>

    <!-- NAVIGATION -->
    <nav class="space-y-2 flex-1">

        <a href="informant-dashboard.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-speedometer2"></i>
            Dashboard

        </a>



        <!-- ACTIVE -->
        <a href="submit-tip.html"
           class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold shadow-lg">

            <i class="bi bi-lightbulb-fill"></i>
            Submit Tip

        </a>

        <a href="my-tips.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-lightbulb"></i>
            My Tips

        </a>

        <a href="informant-edit-profile.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">

            <i class="bi bi-pencil-square"></i>
            Edit Profile

        </a>

    </nav>

    <!-- LOGOUT -->
    <button onclick="logout()"
            class="flex items-center justify-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4 shadow-lg">

        <i class="bi bi-box-arrow-left"></i>
        Logout

    </button>

</aside>

<!-- MAIN -->
<main class="flex-1 p-8 overflow-y-auto">

    <!-- TOP HEADER -->
    <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4 mb-8">

        <div>

            <h1 class="text-3xl font-bold text-gray-800">
                Submit Intelligence Tip
            </h1>

            <p class="text-gray-500 text-sm mt-1">
                Share valuable information securely with authorities
            </p>

        </div>

        <div class="bg-white rounded-xl px-4 py-2 shadow-sm border border-gray-200 flex items-center gap-2 text-sm text-gray-600">

            <i class="bi bi-calendar-event text-blue-600"></i>

            <span id="currentDate"></span>

        </div>

    </div>

    <!-- FORM -->
    <div class="bg-white rounded-3xl shadow-lg border border-gray-200 overflow-hidden">

        <!-- HEADER -->
        <div class="bg-gradient-to-r from-blue-800 to-blue-900 px-8 py-6 text-white">

            <div class="flex items-center gap-4">

                <div class="bg-white/20 p-4 rounded-2xl">

                    <i class="bi bi-lightbulb-fill text-3xl"></i>

                </div>

                <div>

                    <h2 class="text-2xl font-bold">
                        Intelligence Information
                    </h2>

                    <p class="text-blue-100 text-sm mt-1">
                        Provide complete and accurate details
                    </p>

                </div>

            </div>

        </div>

        <!-- BODY -->
        <div class="p-8">

            <form class="space-y-6">

                <!-- TITLE -->
                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Tip Title
                    </label>

                    <div class="relative">

                        <i class="bi bi-type absolute left-4 top-4 text-gray-400"></i>

                        <input
                                id="title"
                                type="text"
                                placeholder="Enter tip title"
                                class="w-full border border-gray-300 rounded-2xl p-4 pl-12 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                        >

                    </div>

                </div>

                <!-- DESCRIPTION -->
                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Description
                    </label>

                    <div class="relative">

                        <i class="bi bi-card-text absolute left-4 top-4 text-gray-400"></i>

                        <textarea
                                id="description"
                                rows="6"
                                placeholder="Provide complete details..."
                                class="w-full border border-gray-300 rounded-2xl p-4 pl-12 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none transition resize-none"
                        ></textarea>

                    </div>

                </div>

                <!-- GRID -->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- LOCATION -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Location
                        </label>

                        <div class="relative">

                            <i class="bi bi-geo-alt-fill absolute left-4 top-4 text-gray-400"></i>

                            <input
                                    id="location"
                                    type="text"
                                    placeholder="Enter location"
                                    class="w-full border border-gray-300 rounded-2xl p-4 pl-12 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                            >

                        </div>

                    </div>

                    <!-- CATEGORY -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Category
                        </label>

                        <div class="relative">

                            <i class="bi bi-tags-fill absolute left-4 top-4 text-gray-400"></i>

                            <input
                                    id="category"
                                    type="text"
                                    placeholder="Enter category"
                                    class="w-full border border-gray-300 rounded-2xl p-4 pl-12 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                            >

                        </div>

                    </div>

                </div>

                <!-- PRIORITY -->
                <div>

                    <label class="block text-sm font-semibold text-gray-700 mb-2">
                        Priority Level
                    </label>

                    <select
                            id="priority"
                            class="w-full border border-gray-300 rounded-2xl p-4 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none transition">

                        <option value="LOW">LOW</option>
                        <option value="MEDIUM" selected>MEDIUM</option>
                        <option value="HIGH">HIGH</option>

                    </select>

                </div>

                <!-- ANONYMOUS -->
                <div class="bg-yellow-50 border border-yellow-200 rounded-2xl p-5">

                    <label class="flex items-start gap-4 cursor-pointer">

                        <input
                                type="checkbox"
                                id="anonymous"
                                onchange="toggleInformant()"
                                class="mt-1 w-5 h-5"
                        >

                        <div>

                            <span class="font-semibold text-gray-800">
                                Submit Anonymously
                            </span>

                            <p class="text-sm text-gray-500 mt-1">
                                Your identity will remain hidden from officials
                            </p>

                        </div>

                    </label>

                </div>

                <!-- INFORMANT -->
                <div id="informantBox"
                     class="grid grid-cols-1 md:grid-cols-2 gap-6">

                    <!-- NAME -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Your Name
                        </label>

                        <div class="relative">

                            <i class="bi bi-person-fill absolute left-4 top-4 text-gray-400"></i>

                            <input
                                    id="informantName"
                                    type="text"
                                    placeholder="Enter full name"
                                    class="w-full border border-gray-300 rounded-2xl p-4 pl-12 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                            >

                        </div>

                    </div>

                    <!-- CONTACT -->
                    <div>

                        <label class="block text-sm font-semibold text-gray-700 mb-2">
                            Contact Information
                        </label>

                        <div class="relative">

                            <i class="bi bi-telephone-fill absolute left-4 top-4 text-gray-400"></i>

                            <input
                                    id="informantContact"
                                    type="text"
                                    placeholder="Phone or Email"
                                    class="w-full border border-gray-300 rounded-2xl p-4 pl-12 bg-gray-50 focus:ring-2 focus:ring-blue-500 focus:outline-none transition"
                            >

                        </div>

                    </div>

                </div>

                <!-- BUTTONS -->
                <div class="flex flex-wrap gap-4 pt-4">

                    <button
                            type="button"
                            onclick="submitTip()"
                            class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-2xl font-semibold shadow-md transition">

                        <i class="bi bi-send-fill mr-2"></i>
                        Submit Tip

                    </button>

                    <a href="my-tips.html"
                       class="bg-gray-500 hover:bg-gray-600 text-white px-8 py-3 rounded-2xl font-semibold transition">

                        <i class="bi bi-arrow-left mr-2"></i>
                        Back

                    </a>

                </div>

            </form>

        </div>

    </div>

</main>

<script>

    // DATE
    document.getElementById("currentDate").innerText =
        new Date().toLocaleDateString("en-IN", {

            weekday: "long",
            year: "numeric",
            month: "long",
            day: "numeric"
        });

    function toggleInformant() {

        const anon = document.getElementById("anonymous").checked;

        document.getElementById("informantBox").style.display =
            anon ? "none" : "grid";
    }

    async function submitTip() {

        const tip = {

            title: document.getElementById("title").value,

            description: document.getElementById("description").value,

            location: document.getElementById("location").value,

            category: document.getElementById("category").value,

            // IMPORTANT FIX
            priority: document.getElementById("priority").value || "MEDIUM",

            anonymous: document.getElementById("anonymous").checked,

            informantName: document.getElementById("informantName").value,

            informantContact: document.getElementById("informantContact").value,

            informantUserId: Number(userId)
        };

        console.log("Sending Tip:", tip);

        try {

            const res = await fetch(`${BASE_URL}/tips/submit`, {

                method: "POST",

                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },

                body: JSON.stringify(tip)
            });

            if (res.ok) {

                alert("Tip submitted successfully!");

                window.location.href = "my-tips.html";

            } else {

                const error = await res.text();

                console.log(error);

                alert("Error submitting tip");
            }

        } catch (e) {

            console.log(e);

            alert("Server error");
        }
    }

    toggleInformant();

</script>

</body>
</html>
