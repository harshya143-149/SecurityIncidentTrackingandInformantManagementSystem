<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Submit Tip</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-blue-50 text-gray-900 min-h-screen flex items-center justify-center p-6">

<div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-lg">
    <h2 class="text-3xl font-bold text-center mb-6 text-blue-600">Submit Anonymous / Informant Tip</h2>

    <form id="tipForm" class="space-y-4">

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Title:</label>
            <input type="text" id="title" placeholder="Title" class="w-full p-3 rounded border border-gray-300 bg-blue-50 text-gray-900 focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Description:</label>
            <textarea id="description" placeholder="Description" rows="4" class="w-full p-3 rounded border border-gray-300 bg-blue-50 text-gray-900 focus:ring-2 focus:ring-blue-400"></textarea>
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Location:</label>
            <input type="text" id="location" placeholder="Location" class="w-full p-3 rounded border border-gray-300 bg-blue-50 text-gray-900 focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Category:</label>
            <input type="text" id="category" placeholder="Category" class="w-full p-3 rounded border border-gray-300 bg-blue-50 text-gray-900 focus:ring-2 focus:ring-blue-400">
        </div>

        <div>
            <label class="block mb-1 font-semibold text-gray-700">Priority:</label>
            <select id="priority" class="w-full p-3 rounded border border-gray-300 bg-blue-50 text-gray-900 focus:ring-2 focus:ring-blue-400">
                <option value="LOW">LOW</option>
                <option value="MEDIUM">MEDIUM</option>
                <option value="HIGH">HIGH</option>
            </select>
        </div>

        <div class="flex items-center space-x-2">
            <input type="checkbox" id="anonymous" class="w-5 h-5" onchange="toggleInformantFields()">
            <label for="anonymous" class="text-gray-700">Submit as Anonymous?</label>
        </div>

        <div id="informantFields" class="space-y-2">
            <div>
                <label class="block mb-1 font-semibold text-gray-700">Your Name (Optional):</label>
                <input type="text" id="informantName" placeholder="Your Name" class="w-full p-3 rounded border border-gray-300 bg-blue-50 text-gray-900 focus:ring-2 focus:ring-blue-400">
            </div>

            <div>
                <label class="block mb-1 font-semibold text-gray-700">Contact (Optional):</label>
                <input type="text" id="informantContact" placeholder="Contact Number or Email" class="w-full p-3 rounded border border-gray-300 bg-blue-50 text-gray-900 focus:ring-2 focus:ring-blue-400">
            </div>
        </div>

        <button type="button" class="w-full p-3 bg-blue-600 hover:bg-blue-700 rounded-lg text-white font-semibold transition" onclick="submitTip()">
            Submit Tip
        </button>
    </form>
</div>

<script>
    function toggleInformantFields() {
        const anonymous = document.getElementById("anonymous").checked;
        document.getElementById("informantFields").style.display = anonymous ? "none" : "block";
    }

    async function submitTip() {
        const tip = {
            title: document.getElementById("title").value.trim(),
            description: document.getElementById("description").value.trim(),
            location: document.getElementById("location").value.trim(),
            category: document.getElementById("category").value.trim(),
            priority: document.getElementById("priority").value,
            anonymous: document.getElementById("anonymous").checked,
            informantName: document.getElementById("informantName").value.trim(),
            informantContact: document.getElementById("informantContact").value.trim()
        };

        if (!tip.title || !tip.description || !tip.location) {
            return alert("Title, Description, and Location are required.");
        }

        try {
            const res = await fetch("/tips/submit", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(tip)
            });

            if (!res.ok) {
                const errText = await res.text();
                return alert("Failed to submit tip: " + errText);
            }

            alert("Tip submitted successfully!");
            document.getElementById("tipForm").reset();
            toggleInformantFields();

        } catch (err) {
            console.error(err);
            alert("Error submitting tip.");
        }
    }

    // Initialize visibility on load
    toggleInformantFields();
</script>

</body>
</html>
