<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SITIMS | Edit Profile</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen flex">

<script>
    const BASE_URL = "http://localhost:8080";
    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");
    const userRole = localStorage.getItem("role");

    function isTokenExpired(t) {
        try {
            const p = JSON.parse(atob(t.split('.')[1]));
            return p.exp * 1000 < Date.now();
        } catch {
            return true;
        }
    }

    if (!token || !userId || isTokenExpired(token)) {
        localStorage.clear();
        window.location.href = "login.html";
    }
</script>

<!-- Sidebar -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 shadow-2xl">
    <div class="mb-6">
        <div class="flex items-center gap-3 mb-1">
            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
            <h2 class="text-xl font-extrabold">SITIMS</h2>
        </div>
        <p class="text-blue-400 text-xs ml-9">User Panel</p>
    </div>

    <nav class="space-y-1 flex-1">
        <a href="dashboard.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="create-incident.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-plus-circle"></i> Report Incident
        </a>

        <a href="my-incidents.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-file-earmark-text"></i> My Incidents
        </a>

        <a href="submit-tip.html"
           class="flex items-center gap-3 p-3 rounded-xl hover:bg-blue-800 transition">
            <i class="bi bi-lightbulb"></i> Submit Tip
        </a>

        <a href="user-edit-profile.html"
           class="flex items-center gap-3 p-3 rounded-xl bg-blue-700 font-semibold">
            <i class="bi bi-person-gear"></i> Edit Profile
        </a>
    </nav>

    <button onclick="logout()"
            class="flex items-center gap-3 p-3 rounded-xl bg-red-600 hover:bg-red-700 transition font-semibold mt-4">
        <i class="bi bi-box-arrow-left"></i> Logout
    </button>
</aside>

<!-- Main -->
<main class="flex-1 p-8">

    <div class="max-w-2xl mx-auto">

        <div class="mb-8">
            <h1 class="text-3xl font-bold text-gray-800">Edit Profile</h1>
            <p class="text-gray-500 text-sm mt-1">
                Update your personal details and password
            </p>
        </div>

        <!-- Error -->
        <div id="errorMsg"
             class="hidden bg-red-50 border border-red-200 text-red-600 rounded-xl px-4 py-3 mb-5 text-sm">
        </div>

        <!-- Success -->
        <div id="successMsg"
             class="hidden bg-green-50 border border-green-200 text-green-700 rounded-xl px-4 py-3 mb-5 text-sm">
        </div>

        <!-- Profile Card -->
        <div class="bg-white rounded-2xl shadow-md p-8 mb-6 border border-gray-100">

            <div class="flex items-center gap-4 mb-6">
                <div class="w-16 h-16 bg-blue-100 rounded-2xl flex items-center justify-center">
                    <i class="bi bi-person-fill text-blue-600 text-3xl"></i>
                </div>

                <div>
                    <h2 class="text-xl font-bold text-gray-800" id="profileNameDisplay">—</h2>
                    <p class="text-gray-500 text-sm" id="profileEmailDisplay">—</p>
                </div>
            </div>

            <!-- Profile Form -->
            <form id="profileForm" class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Full Name
                    </label>

                    <input type="text"
                           id="name"
                           required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Email
                    </label>

                    <input type="email"
                           id="email"
                           required
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                </div>

                <button type="submit"
                        id="profileBtn"
                        class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3 rounded-xl font-semibold transition">
                    <span id="profileBtnText">Update Profile</span>
                </button>

            </form>
        </div>

        <!-- Password Card -->
        <div class="bg-white rounded-2xl shadow-md p-8 border border-gray-100">

            <h3 class="font-bold text-gray-700 text-lg mb-6">
                Change Password
            </h3>

            <form id="passwordForm" class="space-y-4">

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        New Password
                    </label>

                    <input type="password"
                           id="newPassword"
                           placeholder="Enter new password"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-1">
                        Confirm New Password
                    </label>

                    <input type="password"
                           id="confirmNewPassword"
                           placeholder="Confirm new password"
                           class="w-full px-4 py-3 border border-gray-300 rounded-xl bg-gray-50 focus:ring-2 focus:ring-blue-400 focus:outline-none">
                </div>

                <button type="submit"
                        id="pwdBtn"
                        class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-semibold transition">
                    <span id="pwdBtnText">Update Password</span>
                </button>

            </form>

        </div>

    </div>

</main>

<script>

    function showError(msg) {
        document.getElementById("errorMsg").innerText = msg;
        document.getElementById("errorMsg").classList.remove("hidden");

        document.getElementById("successMsg").classList.add("hidden");
    }

    function showSuccess(msg) {
        document.getElementById("successMsg").innerText = msg;
        document.getElementById("successMsg").classList.remove("hidden");

        document.getElementById("errorMsg").classList.add("hidden");
    }

    // Load user from localStorage
    const userName = localStorage.getItem("name") || "";
    const userEmail = localStorage.getItem("emailFromLogin") || "";

    document.getElementById("name").value = userName;
    document.getElementById("email").value = userEmail;

    document.getElementById("profileNameDisplay").innerText = userName;
    document.getElementById("profileEmailDisplay").innerText = userEmail;

    // =========================
    // UPDATE PROFILE
    // =========================
    document.getElementById("profileForm").addEventListener("submit", async (e) => {

        e.preventDefault();

        const name = document.getElementById("name").value.trim();
        const email = document.getElementById("email").value.trim();

        document.getElementById("profileBtn").disabled = true;
        document.getElementById("profileBtnText").innerText = "Updating...";

        try {

            const res = await fetch(`${BASE_URL}/api/users/update`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    name: name,
                    email: email,
                    role: userRole
                })
            });

            if (!res.ok) {
                throw new Error();
            }

            localStorage.setItem("name", name);
            localStorage.setItem("emailFromLogin", email);

            document.getElementById("profileNameDisplay").innerText = name;
            document.getElementById("profileEmailDisplay").innerText = email;

            showSuccess("Profile updated successfully!");

        } catch (err) {

            showError("Failed to update profile.");

        } finally {

            document.getElementById("profileBtn").disabled = false;
            document.getElementById("profileBtnText").innerText = "Update Profile";
        }

    });

    // =========================
    // UPDATE PASSWORD
    // =========================
    document.getElementById("passwordForm").addEventListener("submit", async (e) => {

        e.preventDefault();

        const newPassword = document.getElementById("newPassword").value;
        const confirmPassword = document.getElementById("confirmNewPassword").value;

        if (newPassword !== confirmPassword) {
            showError("Passwords do not match.");
            return;
        }

        if (newPassword.length < 6) {
            showError("Password must be at least 6 characters.");
            return;
        }

        document.getElementById("pwdBtn").disabled = true;
        document.getElementById("pwdBtnText").innerText = "Updating...";

        try {

            const res = await fetch(`${BASE_URL}/api/users/update`, {
                method: "PUT",
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": "Bearer " + token
                },
                body: JSON.stringify({
                    name: document.getElementById("name").value,
                    email: document.getElementById("email").value,
                    password: newPassword,
                    role: userRole
                })
            });

            if (!res.ok) {
                throw new Error();
            }

            document.getElementById("newPassword").value = "";
            document.getElementById("confirmNewPassword").value = "";

            showSuccess("Password updated successfully!");

        } catch (err) {

            showError("Failed to update password.");

        } finally {

            document.getElementById("pwdBtn").disabled = false;
            document.getElementById("pwdBtnText").innerText = "Update Password";
        }

    });

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

</script>

</body>
</html>
