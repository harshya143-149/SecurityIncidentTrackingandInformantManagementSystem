<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Update Incident</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-gray-100 min-h-screen flex">

<script>

    const BASE_URL = "http://localhost:8080";

    const token = localStorage.getItem("token");
    const userId = localStorage.getItem("userId");
    const role = localStorage.getItem("role");

    function isTokenExpired(t) {
        try {
            const payload = JSON.parse(atob(t.split('.')[1]));
            return payload.exp * 1000 < Date.now();
        } catch {
            return true;
        }
    }

    if (!token || !userId || isTokenExpired(token)) {
        localStorage.clear();
        alert("Session expired. Please login again.");
        window.location.href = "login.html";
    }

    const id = new URLSearchParams(window.location.search).get("id");

    function logout() {
        localStorage.clear();
        window.location.href = "login.html";
    }

</script>

<!-- SIDEBAR -->
<aside class="w-64 bg-blue-900 text-white flex flex-col p-6 min-h-screen">

    <div class="mb-6">
        <div class="flex items-center gap-2">
            <i class="bi bi-shield-lock-fill text-2xl text-blue-300"></i>
            <h2 class="text-xl font-bold">SITIMS</h2>
        </div>
        <p class="text-blue-300 text-sm ml-7">User Dashboard</p>
    </div>

    <nav class="flex-1 space-y-2">

        <a href="dashboard.html" class="block p-2 hover:bg-blue-800 rounded">
            <i class="bi bi-speedometer2"></i> Dashboard
        </a>

        <a href="create-incident.html" class="block p-2 hover:bg-blue-800 rounded">
            <i class="bi bi-plus-circle"></i> Create Incident
        </a>

        <a href="my-incidents.html" class="block p-2 bg-blue-700 rounded font-semibold">
            <i class="bi bi-list-ul"></i> My Incidents
        </a>

        <a href="submit-tip.html" class="block p-2 hover:bg-blue-800 rounded">
            <i class="bi bi-lightbulb"></i> Submit Tip
        </a>

    </nav>

    <button onclick="logout()"
            class="bg-red-600 hover:bg-red-700 py-2 rounded mt-4">
        <i class="bi bi-box-arrow-left"></i> Logout
    </button>

</aside>

<!-- MAIN CONTENT -->
<main class="flex-1 p-10">

    <div class="max-w-3xl mx-auto bg-white p-8 rounded-xl shadow">

        <h1 class="text-3xl font-bold text-blue-600 mb-6">
            Update Incident
        </h1>

        <div class="mb-4">
            <label class="font-semibold">Title</label>
            <input id="title" class="w-full p-3 border rounded mt-1">
        </div>

        <div class="mb-4">
            <label class="font-semibold">Description</label>
            <textarea id="description" class="w-full p-3 border rounded mt-1"></textarea>
        </div>

        <div class="mb-4">
            <label class="font-semibold">Location</label>
            <input id="location" class="w-full p-3 border rounded mt-1">
        </div>

        <div class="mb-4">
            <label class="font-semibold">Severity</label>
            <select id="severity" class="w-full p-3 border rounded mt-1">
                <option>LOW</option>
                <option>MEDIUM</option>
                <option>HIGH</option>
                <option>CRITICAL</option>
            </select>
        </div>

        <button onclick="updateIncident()"
                class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700">
            Update Incident
        </button>

    </div>

</main>

<script>

    async function loadIncident() {

        try {
            const res = await fetch(`${BASE_URL}/api/incidents/${id}`, {
                headers: {
                    "Authorization": "Bearer " + token
                }
            });

            const data = await res.json();

            document.getElementById("title").value = data.title || "";
            document.getElementById("description").value = data.description || "";
            document.getElementById("location").value = data.location || "";
            document.getElementById("severity").value = data.severity || "LOW";

        } catch (err) {
            console.error(err);
            alert("Error loading incident");
        }
    }

    async function updateIncident() {

        const payload = {
            title: document.getElementById("title").value,
            description: document.getElementById("description").value,
            location: document.getElementById("location").value,
            severity: document.getElementById("severity").value
        };

        try {

            const res = await fetch(`${BASE_URL}/api/incidents/update/${id}`, {
                method: "PUT",
                headers: {
                    "Authorization": "Bearer " + token,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(payload)
            });

            if (!res.ok) {
                const msg = await res.text();
                throw new Error(msg);
            }

            alert("Incident updated successfully!");
            window.location.href = "my-incidents.html";

        } catch (err) {
            console.error(err);
            alert("Update failed: " + err.message);
        }
    }

    loadIncident();

</script>

</body>
</html>
